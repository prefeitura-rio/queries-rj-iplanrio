    description: "**Descrição**: Cadastro de empresas com informações sobre porte e situação cadastral\n**Frequência de atualização**: Mensal\n**Cobertura temporal**: Indefinido\n**Órgão gestor dos dados**: SMFP\n**Publicado por**: Indefinido\n**Publicado por (email)**: indefinido@mail.com\n"
