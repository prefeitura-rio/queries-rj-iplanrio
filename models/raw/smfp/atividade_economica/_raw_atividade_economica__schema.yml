      - name: ID_Direcionamento
        description: Identificador do direcionamento
      - name: ID_TipoContribuint
        description: Identificador do tipo de contribuinte
      - name: ID_TipoSolicitacao
        description: Identificador do tipo de solicitação

  - name: raw_atividade_economica__fact_fatocp
