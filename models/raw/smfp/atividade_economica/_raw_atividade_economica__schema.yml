      - name: ID_Alvara
        description: Identificador único do alvará
      - name: Quantidade
        description: Quantidade de alvarás
      - name: ID_AtvProcesso
        description: Identificador da atividade do processo
      - name: ID_CAE
        description: Identificador do código CAE (Classificação de Atividades Econômicas)
      - name: ID_CNAE
        description: Identificador do código CNAE (Classificação Nacional de Atividades Econômicas)
      - name: ID_DiaDeferimento
        description: Identificador do dia de deferimento do alvará
      - name: ID_DiaSolicitacao
