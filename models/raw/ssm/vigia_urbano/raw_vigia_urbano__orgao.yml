version: 2

models:
  - name: raw_vigia_urbano__orgao
    description: "Tabela de Orgãos do sistema Vigia Urbano."
    columns:
      - name: id_orgao
        description: "Identificador único do registro de órgão"
        data_type: int64
        tests:
          - unique:
              name: raw_vigia_urbano__orgao__id_orgao__unique
              severity: error
          - not_null:
              name: raw_vigia_urbano__orgao__id_orgao__not_null
              severity: error
      - name: nome_orgao
        description: "Nome do órgão"
        data_type: string
        quote: true
      - name: codigo_orgao
        description: "Código do órgão"
        data_type: int64
      - name: id_subprefeitura
        description: "Identificador da subprefeitura"
        data_type: int64
      - name: subprefeitura_json
        description: "Registros da subprefeitura"
        data_type: string
        quote: true
      - name: datalake_loaded_at
        description: "Data de quando o dado foi extraído do banco de dados de origem do Vigia Urbano"
        data_type: datetime
      - name: datalake_transformed_at
        description: "Data de quando o dado foi transformado no dbt"
        data_type: datetime
