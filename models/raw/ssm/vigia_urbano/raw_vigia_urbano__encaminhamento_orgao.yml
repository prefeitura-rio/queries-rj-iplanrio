version: 2

models:
  - name: raw_vigia_urbano__encaminhamento_orgao
    description: Tabela de encaminhamentos de órgãos do sistema Vigia Urbano
    columns:
      - name: id_encaminhamento
        description: Identificador único do encaminhamento
        data_type: string
        quote: true

      - name: id_chamado
        description: Identificador do chamado relacionado ao encaminhamento
        data_type: string
        quote: true

      - name: id_orgao
        description: Identificador do órgão envolvido no encaminhamento
        data_type: string
        quote: true

      - name: status
        description: |
          Status atual do encaminhamento:
          1 = A_INICIAR
          2 = EM_ANDAMENTO
          3 = CONCLUIDO_PARCIALMENTE
          4 = CONCLUIDO
          5 = NAO_CONCLUIDO
          6 = CANCELADO
        data_type: int64
        quote: true

      - name: atividade
        description: Texto da solução ou atividade realizada no encaminhamento
        data_type: string
        quote: true

      - name: id_usuario
        description: Identificador do usuário responsável pelo encaminhamento
        data_type: string
        quote: true

      - name: data_registro
        description: Data e hora de criação do encaminhamento
        data_type: datetime
        quote: true

      - name: data_conclusao
        description: Data e hora de conclusão do encaminhamento
        data_type: datetime
        quote: true

      - name: datalake_loaded_at
        description: Data e hora de carregamento no datalake
        data_type: datetime
        quote: true

      - name: datalake_transformed_at
        description: Data e hora de transformação no datalake
        data_type: datetime
        quote: true
