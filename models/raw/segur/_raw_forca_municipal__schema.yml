version: 2

models:
  - name: raw_api_segur__unidades_ativas
    description: "Unidades/viaturas logadas no sistema da Força Municipal"
    columns:
      - name: id_agencia
        description: "Identificador da agência responsável (ex: 'FORCA')"
      - name: tempo_duracao_alarme
        description: "Tempo de duração do alarme em milissegundos"
      - name: id_ocorrencia_atribuida
        description: "ID da ocorrência atualmente atribuída à unidade"
      - name: setor_patrulhamento
        description: "Setor ou subsetor de patrulhamento (ex: 'Leblon', 'Copacabana')"
      - name: comentario_alteracao
        description: "Comentário sobre a alteração realizada na ocorrência"
      - name: dados_personalizados
        description: "Campo para informações personalizadas em formato JSON string"
      - name: status_disponibilidade_padrao
        description: "Status padrão de disponibilidade da unidade"
      - name: tempo_atraso
        description: "Tempo de atraso registrado em milissegundos"
      - name: nivel_alarme_despacho
        description: "Nível de alarme utilizado para o despacho"
      - name: grupo_despacho
        description: "Grupo de despacho da ocorrência (ex: '23 AISP - Leblon')"
      - name: indicador_indisponivel
        description: "Indica se a unidade está indisponível"
      - name: latitude
        description: "Coordenada geográfica de latitude"
      - name: endereco
        description: "Endereço em formato textual"
      - name: data_hora_login_sistema
        description: "Data e hora em que a unidade/viatura logou no sistema"
      - name: longitude
        description: "Coordenada geográfica de longitude"
      - name: codigo_motivo_fora_servico
        description: "Código do motivo de saída de serviço da unidade"
      - name: codigo_status_atual
        description: "Código numérico do estado atual da unidade"
      - name: data_hora_mudanca_status
        description: "Data e hora da mudança de status da unidade"
      - name: id_ocorrencia
        description: "Identificador único da ocorrência"
      - name: codigo_subtipo_ocorrencia
        description: "Código do subtipo da ocorrência vinculada ao status"
      - name: codigo_tipo_ocorrencia
        description: "Código do tipo da ocorrência vinculada ao status"
      - name: tempo_total_ocorrencias
        description: "Tempo total gasto em ocorrências em milissegundos"
      - name: tempo_total_indisponivel
        description: "Tempo total em que a unidade ficou indisponível (não contando com 'Fora de serviço') em milissegundos"
