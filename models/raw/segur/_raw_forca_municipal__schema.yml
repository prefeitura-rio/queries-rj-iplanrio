        description: "Identificador da unidade/viatura (ex: 'POG01')"
      - name: tipo_viatura
        description: "Tipo da unidade/veículo (ex: 'POG', 'VTR', 'MOT')"
      - name: contador_atualizacoes
        description: "Contador de atualizações realizadas na ocorrência"
      - name: zona_geografica
        description: "Zona geográfica ampla (ex: 'Zona Sul')"

