version: 2

models:
  - name: raw_segur_forca_municipal__qmd_geometria_missoes_patrulha
    description: >
      Rotas de patrulhamento (tipo_missao = 'PTR') — geometria LineString.
      Derivado de qmd_kml, apenas filtra por tipo_missao.
      Representa os caminhos planejados que as viaturas/motos devem percorrer.
      Join canônico: qmd_missoes LEFT JOIN qmd_geometria_missoes_patrulha USING (id_missao).
      Frequência de atualização: diária.
      Órgão gestor dos dados: SEGUR / Força Municipal.
    columns:
      - name: id_hash
        description: >
          Hash MD5 estável sobre campos estruturais (id_qmd, id_missao, geometria_wkt,
          tipo_missao, hora_inicio/fim, roteiro_raw). Exclui descricao e servicos.
          Chave única — 1 linha por geometry distinta. Herdado de qmd_geometria_kml.
        data_type: string
        tests:
          - not_null
          - unique
      - name: id_hash_original
        description: Hash original do pipeline upstream rj-segur. Volátil — mantido para rastreabilidade.
        data_type: string
        tests:
          - not_null
      - name: first_seen
        description: Datetime da primeira coleta desta versão.
        data_type: datetime
      - name: last_seen
        description: Datetime da última coleta desta versão.
        data_type: datetime
      - name: updated_at
        description: Igual a last_seen.
        data_type: datetime
      - name: data_particao
        description: Data da partição mais recente desta versão.
        data_type: date
      - name: id_qmd
        description: Identificador do QMD. FK para qmd.
        data_type: string
      - name: id_missao
        description: Identificador da missão. FK para qmd_missoes.id_missao.
        data_type: string
      - name: nome
        description: Nome da feature KML.
        data_type: string
      - name: tipo_missao
        description: Sempre 'PTR' nesta tabela.
        data_type: string
      - name: tipo_missao_nome
        description: Sempre 'patrulhamento' nesta tabela.
        data_type: string
      - name: tipo_geometria
        description: Sempre 'LINESTRING' nesta tabela.
        data_type: string
      - name: tipo_operacional
        description: Sempre 'patrulha' nesta tabela.
        data_type: string
      - name: hora_inicio_missao
        description: Hora de início planejada da rota.
        data_type: time
      - name: hora_fim_missao
        description: Hora de fim planejada da rota.
        data_type: time
      - name: roteiro
        description: >
          Sequência de ruas do percurso de patrulha, com prefixo de tipo removido.
          100% preenchido.
        data_type: string
      - name: id_roteiro
        description: Slug do roteiro. Agrupador para filtros — todas as geometrias com mesmo roteiro. 100% preenchido.
        data_type: string
        tests:
          - not_null
      - name: id_subarea
        description: >
          Slug da subárea à qual esta rota pertence geograficamente.
          Join primário: mesmo QMD + ST_INTERSECTS. Fallback: subarea mais próxima de
          qualquer QMD via ST_DISTANCE (sem filtro espacial) — cobre casos de borda/precisão.
          NULL apenas quando não existem subareas cadastradas em nenhum QMD.
        data_type: string
      - name: id_area
        description: >
          Slug da área de base inteira à qual esta rota pertence geograficamente.
          Join primário: mesmo QMD + ST_INTERSECTS. Fallback: area mais próxima de
          qualquer QMD via ST_DISTANCE (sem filtro espacial).
          NULL apenas quando não existem areas cadastradas em nenhum QMD.
        data_type: string
      - name: servicos
        description: Unidades alocadas a esta rota. ARRAY<STRING> de valores distintos.
        data_type: "array<string>"
      - name: descricao
        description: HTML com atributos da missão.
        data_type: string
      - name: dados_extendidos
        description: JSON bruto com metadados da missão.
        data_type: string
      - name: geometria_wkt
        description: Geometria LineString em formato WKT.
        data_type: string
      - name: geometry
        description: >
          Geometria LineString como GEOGRAPHY. Usar ST_DWITHIN para verificar
          se um ponto GPS está próximo da rota planejada.
        data_type: geography
