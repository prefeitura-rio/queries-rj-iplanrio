version: 2

models:
  - name: raw_segur_forca_municipal__qmd_geometria_kml_outros
    description: >
      Catch-all para feições do endpoint GET /api/qmd/kml cujo `kml_folder` não é
      reconhecido por `qmd_geometria_sede` (pasta QMD) nem pelos modelos
      `qmd_geometria_missoes_*` (pasta Missões).
      Em condições normais esta tabela deve ter zero linhas.
      `total_linhas > 0` no monitoramento_qualidade indica que a API introduziu um novo
      tipo de pasta KML — investigar o campo `kml_folder_raw` e criar modelo dedicado.
      Frequência de atualização: diária.
      Fonte: GET /api/qmd/kml.
      Órgão gestor dos dados: SEGUR / Força Municipal.
    columns:
      - name: id_hash
        description: Hash MD5 de 32 hex calculado por linha sobre as colunas da API.
        data_type: string
        tests:
          - not_null
          - unique
      - name: first_seen
        description: Datetime da primeira coleta em que esta versão foi observada.
        data_type: datetime
      - name: last_seen
        description: Datetime da última coleta em que esta versão foi observada.
        data_type: datetime
      - name: updated_at
        description: Igual a last_seen.
        data_type: datetime
      - name: data_particao
        description: Data da partição mais recente em que esta versão foi observada.
        data_type: date
      - name: id_qmd
        description: Identificador do QMD. FK para qmd.
        data_type: string
      - name: kml_folder_raw
        description: >
          Valor original do campo `kml_folder` da staging, sem normalização.
          Usar para identificar o novo tipo de pasta introduzido pela API.
        data_type: string
      - name: nome
        description: Nome da feature KML.
        data_type: string
      - name: tipo_geometria
        description: Tipo de geometria da feature (Point, LineString, Polygon).
        data_type: string
      - name: descricao
        description: HTML com atributos da feature.
        data_type: string
      - name: dados_extendidos
        description: JSON bruto com metadados da feature.
        data_type: string
      - name: geometria_wkt
        description: Geometria em formato WKT.
        data_type: string
