version: 2

models:
  - name: raw_segur_forca_municipal__monitoramento
    description: >
      Monitoramento das tabelas da pipeline `rj_segur__forca_municipal` no dataset
      `brutos_forca_municipal`. Agrega metadados de particionamento e tamanho de cada
      tabela a partir de `INFORMATION_SCHEMA.PARTITIONS`. Atualizado a cada execução
      do pipeline (materialização `table`).
    columns:
      - name: tabela
        description: Nome da tabela no dataset `brutos_forca_municipal`.
      - name: ultima_data_particao
        description: Data da partição mais recente presente na tabela.
      - name: dias_atraso
        description: >
          Diferença em dias entre a data atual (fuso America/Sao_Paulo) e a última
          partição. Valores maiores que 1 podem indicar atraso na ingestão.
      - name: linhas_ultima_particao
        description: Total de linhas na partição mais recente.
      - name: total_linhas
        description: Total de linhas somando todas as partições da tabela.
      - name: total_hashes
        description: >
          Número de batches de extração distintos (count distinct id_hash). Cada
          execução do pipeline de ingestão gera um id_hash único compartilhado por
          todas as linhas daquele lote.
      - name: ultima_modificacao
        description: >
          Timestamp da última modificação de qualquer partição da tabela,
          convertido para o fuso America/Sao_Paulo.
      - name: total_megabytes
        description: Tamanho lógico total da tabela em megabytes.
