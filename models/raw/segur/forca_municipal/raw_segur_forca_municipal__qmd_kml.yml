version: 2

models:
  - name: raw_segur_forca_municipal__qmd_kml
    description: >
      Geometrias KML dos Quadros de Missões Diárias (QMD) e suas missões, exportadas
      do sistema HxGN OnCall. Cada linha representa uma feição geográfica (ponto,
      linha ou polígono) associada a um QMD ou a uma missão específica.
      Frequência de atualização: diária.
      Fonte: GET /api/qmd/kml.
      Órgão gestor dos dados: SEGUR / Força Municipal.
    config:
      alias: qmd_kml
      schema: brutos_forca_municipal
    columns:
      - name: id_hash
        description: Hash MD5 do conteúdo bruto da resposta da API. Identifica um arquivo Parquet no GCS — todas as linhas de um mesmo run compartilham o mesmo hash.
        data_type: string
      - name: updated_at
        description: Datetime da coleta dos dados pela pipeline (America/Sao_Paulo).
        data_type: datetime
      - name: id_qmd
        description: Identificador do QMD ao qual a feição pertence.
        data_type: string
      - name: pasta_kml
        description: Pasta KML à qual a feição pertence (ex. QMD, Missões).
        data_type: string
      - name: nome
        description: Nome da feição KML (ex. Informações do QMD, Missão 128 - PB).
        data_type: string
      - name: tipo_geometria
        description: Tipo da geometria WKT (ex. Point, LineString, Polygon).
        data_type: string
      - name: descricao
        description: Descrição HTML da feição com atributos do QMD ou missão.
        data_type: string
      - name: dados_extendidos
        description: Dados estendidos em formato JSON com atributos adicionais da feição.
        data_type: string
      - name: geometria_wkt
        description: Geometria da feição em formato WKT (Well-Known Text).
        data_type: string
      - name: geometry
        description: Geometria da feição convertida para o tipo GEOGRAPHY via ST_GEOGFROMTEXT.
        data_type: geography
      - name: data_particao
        description: Data de partição dos dados, derivada do caminho do arquivo no GCS.
        data_type: date
