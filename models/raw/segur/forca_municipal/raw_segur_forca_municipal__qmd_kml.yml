version: 2

models:
  - name: raw_segur_forca_municipal__qmd_kml
    description: >
      Geometrias KML dos Quadros de Missões Diárias (QMD) e suas missões, exportadas
      do sistema HxGN OnCall. Cada linha representa uma feição geográfica (ponto,
      linha ou polígono) associada a um QMD ou a uma missão específica.
      Frequência de atualização: diária.
      Fonte: GET /api/qmd/kml.
      Órgão gestor dos dados: SEGUR / Força Municipal.
    columns:
      - name: id_hash
        description: >
          Hash md5 de 32 hex calculado **por linha** sobre as colunas da API (excluindo
          `updated_at`). Chave única desta tabela — uma linha por versão de conteúdo.
          Mesmo conteúdo = mesmo hash entre runs.
        data_type: string
        tests:
          - not_null
          - unique
      - name: first_seen
        description: >
          Datetime da primeira coleta em que esta versão do registro (`id_hash`) foi
          observada. Derivado de `MIN(updated_at)`. Imutável após o insert.
        data_type: datetime
      - name: last_seen
        description: >
          Datetime da última coleta em que esta versão do registro foi observada.
          Derivado de `MAX(updated_at)`. Congela quando o registro muda (novo `id_hash`)
          ou é removido da API — serve como `valid_until` implícito.
        data_type: datetime
      - name: updated_at
        description: >
          Datetime da coleta mais recente em que esta versão foi observada (America/Sao_Paulo).
          Igual a `last_seen` — mantido para compatibilidade com o padrão do dataset.
        data_type: datetime
      - name: data_particao
        description: >
          Data da partição mais recente em que esta versão foi observada. Equivalente a
          `DATE(last_seen)`. Mantido para compatibilidade com o padrão do dataset.
        data_type: date
      - name: id_qmd
        description: Identificador do QMD ao qual a feição pertence.
        data_type: string
      - name: pasta_kml
        description: >
          Pasta KML da feição, normalizada para uppercase sem acentos. Valores:
          `QMD` (1 ponto por QMD, sem dados de missão) e `MISSAO` (1 feature por
          missão não-DS). Usar para distinguir features de área de missão vs ponto de QMD.
        data_type: string
      - name: nome
        description: >
          Nome da feição. Para pasta `QMD`: sempre `"Informações do Qmd"`. Para
          pasta `Missões`: padrão `"Missão NNN - TIPO"` (ex. `"Missão 795 - Pb"`).
        data_type: string
      - name: tipo_geometria
        description: >
          Tipo da geometria. Valores observados: `Point` (pasta QMD e missões PB),
          `LineString` (missões PTR), `Polygon` (missões RF, SV, SP).
          Missões DS não têm feature nesta tabela.
        data_type: string
      - name: descricao
        description: >
          HTML com atributos do QMD (pasta `QMD`: nome, resumo) ou da missão
          (pasta `Missões`: tipo, roteiro, horário). Sempre preenchido.
        data_type: string
      - name: dados_extendidos
        description: >
          JSON com metadados da missão. Presente apenas na pasta `MISSAO`
          (NULL para pasta `QMD`). Campos: `MissaoId` (FK para
          `qmd_detalhes.missoes[].missaoId`), `Tipo`, `Roteiro`, `HoraInicio`,
          `HoraFim`, `Servicos` (string CSV de id_unidade — pode repetir a mesma
          unidade para execuções de semanas diferentes; não normalizado).
        data_type: string
      - name: id_missao
        description: >
          Identificador da missão, extraído de `dados_extendidos.MissaoId`. FK para
          `qmd_detalhes.missoes[].missaoId`. NULL para linhas de pasta `QMD`.
        data_type: string
      - name: tipo_missao
        description: >
          Tipo da missão, extraído de `dados_extendidos.Tipo`. Valores: `PTR`
          (patrulha — LineString), `PB` (ponto base — Point), `RF` / `SV` / `SP`
          (polígonos de área). NULL para linhas de pasta `QMD`. Missões `DS` não
          têm feature nesta tabela.
        data_type: string
      - name: hora_inicio_missao
        description: >
          Hora de início da missão, extraída de `dados_extendidos.HoraInicio`.
          NULL para linhas de pasta `QMD`. Usar com `indicador_hora_cruza_meia_noite`
          de `qmd` para janelas que atravessam a meia-noite.
        data_type: time
      - name: hora_fim_missao
        description: >
          Hora de fim da missão, extraída de `dados_extendidos.HoraFim`.
          NULL para linhas de pasta `QMD`.
        data_type: time
      - name: geometria_wkt
        description: Geometria da feição em formato WKT (Well-Known Text).
        data_type: string
      - name: geometry
        description: >
          Geometria da feição como `GEOGRAPHY`, pronta para funções `ST_*` do
          BigQuery. Derivada de `geometria_wkt` via
          `SAFE.ST_GEOGFROMTEXT(..., make_valid => TRUE)`.
        data_type: geography

