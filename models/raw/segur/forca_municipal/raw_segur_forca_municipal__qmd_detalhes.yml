version: 2

models:
  - name: raw_segur_forca_municipal__qmd_detalhes
    description: >
      Detalhamento dos Quadros de Missões Diárias (QMD) com suas missões embutidas
      em formato JSON. Visão denormalizada que consolida o QMD e suas missões em
      uma única linha por QMD.
      Frequência de atualização: diária.
      Fonte: GET /api/qmd/detalhes.
      Órgão gestor dos dados: SEGUR / Força Municipal.
    config:
      alias: qmd_detalhes
      schema: brutos_forca_municipal
    columns:
      - name: id_hash
        description: >
          Hash md5 de 32 hex calculado **por linha** sobre as colunas da API (excluindo
          `updated_at`). Chave única desta tabela — uma linha por versão de conteúdo.
          Mesmo conteúdo = mesmo hash entre runs.
        data_type: string
      - name: first_seen
        description: >
          Datetime da primeira coleta em que esta versão do registro (`id_hash`) foi
          observada. Derivado de `MIN(updated_at)`. Imutável após o insert.
        data_type: datetime
      - name: last_seen
        description: >
          Datetime da última coleta em que esta versão do registro foi observada.
          Derivado de `MAX(updated_at)`. Congela quando o registro muda (novo `id_hash`)
          ou é removido da API — serve como `valid_until` implícito.
        data_type: datetime
      - name: updated_at
        description: >
          Datetime da coleta mais recente em que esta versão foi observada (America/Sao_Paulo).
          Igual a `last_seen` — mantido para compatibilidade com o padrão do dataset.
        data_type: datetime
      - name: data_particao
        description: >
          Data da partição mais recente em que esta versão foi observada. Equivalente a
          `DATE(last_seen)`. Mantido para compatibilidade com o padrão do dataset.
        data_type: date
      - name: id_qmd
        description: >
          Identificador único do QMD. FK para `qmd`, `qmd_servicos` e `qmd_kml`.
        data_type: string
      - name: nome
        description: >
          Número de portaria do QMD no formato `NNN/26` (ex. `001/26`, `138/26`).
          Mesmo campo que `qmd.nome` — não é nome descritivo.
        data_type: string
      - name: localizacao_patrulha
        description: >
          Localização de atuação do QMD descrita por cruzamentos ou pontos de
          referência específicos. Mesmo campo que `qmd.localizacao_patrulha` —
          não é bairro nem zona administrativa.
        data_type: string
      - name: data_hora_vigencia_inicio
        description: Data e hora de início da vigência do QMD (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_vigencia_fim
        description: >
          Data e hora de fim da vigência do QMD (America/Sao_Paulo). Uma vigência
          tipicamente cobre ~3 meses (múltiplas semanas de operação).
        data_type: datetime
      - name: indicador_ativo
        description: Indica se o QMD está ativo (derivado de `qmdStatusAtivo = 'Sim'`).
        data_type: bool
      - name: indicador_autorizado
        description: Indica se o QMD foi formalmente autorizado (derivado de `qmdStatusAutorizado = 'Sim'`).
        data_type: bool
      - name: indicador_valido
        description: >
          Indica se o QMD é considerado válido pelo sistema (derivado de
          `qmdStatusValido = 'Sim'`). O critério exato não está documentado na API —
          não usar como filtro de qualidade sem confirmar com a equipe da GM.
        data_type: bool
      - name: resumo
        description: Texto livre com o resumo operacional do QMD. Mesmo campo que `qmd.resumo`.
        data_type: string
      - name: missoes
        description: >
          Array JSON com as missões do QMD. Cada elemento representa uma missão com
          os campos: `missaoId` (id único), `tipo` (PTR/PB/DS/RF/SV/SP — não
          documentados oficialmente), `roteiro` (texto livre), `horaInicio`/`horaFim`
          (HH:MM), `geometriaWkt` (WKT string — vazio para tipo DS), e `servicos`
          (array com `servicoId` FK para `qmd_servicos.id_servico`, `nome`
          id_unidade, e `execucoes` com timestamps ISO 8601 por dia planejado).
          O campo `dias` dentro de `servicos[]` é double-encoded (JSON string dentro
          de JSON). 1 QMD inativo tem `missoes = "[]"`.
        data_type: string

