version: 2

models:
  - name: raw_segur_forca_municipal__qmd_geometria_missoes_areas
    description: >
      Áreas de cobertura (tipo_missao IN ('RF','SV','SP')) — geometria Polygon.
      Derivado de qmd_kml, filtra por tipo_missao e adiciona indicador_geometry_util.
      Representa zonas de atuação planejadas por cada missão de área.
      Join canônico: qmd_missoes LEFT JOIN qmd_geometria_missoes_areas USING (id_missao).
      Frequência de atualização: diária.
      Órgão gestor dos dados: SEGUR / Força Municipal.
    columns:
      - name: id_hash
        description: Hash MD5 identificador único da versão da feature.
        data_type: string
        tests:
          - not_null
          - unique
      - name: first_seen
        description: Datetime da primeira coleta desta versão.
        data_type: datetime
      - name: last_seen
        description: Datetime da última coleta desta versão.
        data_type: datetime
      - name: updated_at
        description: Igual a last_seen.
        data_type: datetime
      - name: data_particao
        description: Data da partição mais recente desta versão.
        data_type: date
      - name: id_qmd
        description: Identificador do QMD. FK para qmd.
        data_type: string
      - name: id_missao
        description: Identificador da missão. FK para qmd_missoes.id_missao.
        data_type: string
      - name: nome
        description: Nome da feature KML.
        data_type: string
      - name: tipo_missao
        description: "Tipo da missão. Valores nesta tabela: 'RF', 'SV', 'SP'."
        data_type: string
      - name: tipo_geometria
        description: Sempre 'Polygon' nesta tabela.
        data_type: string
      - name: hora_inicio_missao
        description: Hora de início planejada da missão de área.
        data_type: time
      - name: hora_fim_missao
        description: Hora de fim planejada da missão de área.
        data_type: time
      - name: roteiro
        description: >
          Nome da subárea ou descrição genérica da área de cobertura.
          Para RF subárea: "Dentro da Subárea X". Para RF/SV/SP genérica: "Dentro da área da Base X".
          100% preenchido.
        data_type: string
      - name: servicos
        description: Unidades alocadas a esta área. ARRAY<STRING> de valores distintos.
        data_type: "array<string>"
      - name: descricao
        description: HTML com atributos da missão.
        data_type: string
      - name: dados_extendidos
        description: JSON bruto com metadados da missão.
        data_type: string
      - name: geometria_wkt
        description: Geometria Polygon em formato WKT.
        data_type: string
      - name: geometry
        description: >
          Geometria Polygon como GEOGRAPHY. Usar ST_WITHIN para verificar
          se um ponto GPS está dentro da área planejada.
        data_type: geography
      - name: indicador_geometry_util
        description: >
          TRUE se o polígono tem valor analítico para conformidade operacional.
          FALSE nos seguintes casos (polígono não representa uma área operacional real):

          - SV (Supervisão) e SP (Suporte): geometry é o polígono da base inteira
            (295–587 km²) — qualquer GPS dentro da base seria conforme trivialmente.
          - RF com roteiro genérico "Dentro da área da Base X": mesmo problema,
            polígono da base sem subárea definida.

          Critério para RF: presença de "subárea" no roteiro (semântico, primário) OR
          ST_AREA < 50 km² (safety net para roteiros mal cadastrados sem a palavra "Subárea").

          Usar como filtro em marts de conformidade.
        data_type: bool
        tests:
          - not_null
