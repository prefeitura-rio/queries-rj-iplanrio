version: 2

models:
  - name: raw_segur_forca_municipal__qmd_geometria_missoes_areas
    description: >
      Áreas de cobertura (tipo_missao IN ('RF','SV','SP')) — geometria Polygon.
      Derivado de qmd_geometria_kml, filtra por tipo_missao.
      tipo_area e indicador_geometry_util computados no base model.
      Representa zonas de atuação planejadas por cada missão de área.
      Join canônico: qmd_missoes LEFT JOIN qmd_geometria_missoes_areas USING (id_missao).
      Frequência de atualização: diária.
      Órgão gestor dos dados: SEGUR / Força Municipal.
    columns:
      - name: id_hash
        description: Hash MD5 identificador único da versão da feature.
        data_type: string
        tests:
          - not_null
          - unique
      - name: first_seen
        description: Datetime da primeira coleta desta versão.
        data_type: datetime
      - name: last_seen
        description: Datetime da última coleta desta versão.
        data_type: datetime
      - name: updated_at
        description: Igual a last_seen.
        data_type: datetime
      - name: data_particao
        description: Data da partição mais recente desta versão.
        data_type: date
      - name: id_qmd
        description: Identificador do QMD. FK para qmd.
        data_type: string
      - name: id_missao
        description: Identificador da missão. FK para qmd_missoes.id_missao.
        data_type: string
      - name: nome
        description: Nome da feature KML.
        data_type: string
      - name: tipo_missao
        description: "Tipo da missão. Valores nesta tabela: 'RF', 'SV', 'SP'."
        data_type: string
      - name: tipo_geometria
        description: Sempre 'Polygon' nesta tabela.
        data_type: string
      - name: tipo_area
        description: >
          'area' para RF/SV/SP com ST_AREA > 50 km² (polígono de base inteira);
          'subarea' para RF/SV/SP com ST_AREA ≤ 50 km² (zona operacional real).
          Computado em qmd_geometria_kml.
        data_type: string
      - name: hora_inicio_missao
        description: Hora de início planejada da missão de área.
        data_type: time
      - name: hora_fim_missao
        description: Hora de fim planejada da missão de área.
        data_type: time
      - name: roteiro
        description: >
          Nome da subárea ou descrição da área de cobertura, sem prefixos de tipo
          ou "Dentro da Subárea" (removidos na transformação do base model).
          100% preenchido.
        data_type: string
      - name: servicos
        description: Unidades alocadas a esta área. ARRAY<STRING> de valores distintos.
        data_type: "array<string>"
      - name: descricao
        description: HTML com atributos da missão.
        data_type: string
      - name: dados_extendidos
        description: JSON bruto com metadados da missão.
        data_type: string
      - name: geometria_wkt
        description: Geometria Polygon em formato WKT.
        data_type: string
      - name: geometry
        description: >
          Geometria Polygon como GEOGRAPHY. Usar ST_WITHIN para verificar
          se um ponto GPS está dentro da área planejada.
        data_type: geography
      - name: indicador_geometry_util
        description: >
          TRUE quando ST_AREA < 50 km² — polígono representa uma zona operacional real.
          FALSE quando ST_AREA ≥ 50 km² — polígono de base inteira sem valor analítico
          para análises de conformidade (SV, SP e RF genérica).
          Computado em qmd_geometria_kml. Usar como filtro em marts de conformidade.
        data_type: bool
        tests:
          - not_null
