version: 2

models:
  - name: raw_segur_forca_municipal__qmd
    description: >
      Quadros de Missões Diárias (QMD) cadastrados no sistema HxGN OnCall da Guarda
      Municipal do Rio de Janeiro. Cada QMD define um conjunto de missões e prescrições
      para unidades em uma área e período específicos.
      Frequência de atualização: diária.
      Fonte: GET /api/qmd.
      Órgão gestor dos dados: SEGUR / Força Municipal.
    config:
      alias: qmd
      schema: brutos_forca_municipal
    columns:
      - name: id_hash
        description: Hash MD5 de 16 hex calculado **por linha** sobre as colunas da API (excluindo `updated_at`). Mesmo conteúdo = mesmo hash entre runs. Identifica linhas únicas e detecta duplicatas de fonte.
        data_type: string
      - name: updated_at
        description: Datetime da coleta dos dados pela pipeline (America/Sao_Paulo).
        data_type: datetime
      - name: id_responsavel_criacao
        description: Identificador do usuário que criou o QMD no HxGN OnCall.
        data_type: string
      - name: id_responsavel_autorizacao
        description: >
          Identificador do usuário que autorizou o QMD. Nulo quando
          `indicador_autorizado = false`.
        data_type: string
      - name: id_qmd
        description: >
          Identificador único do QMD. Chave primária desta tabela e FK em
          `qmd_servicos`, `qmd_detalhes` e `qmd_kml`.
        data_type: string
      - name: nome
        description: >
          Número de portaria do QMD no formato `NNN/26` (ex. `001/26`, `138/26`).
          Não é um nome descritivo — o conteúdo operacional está em `resumo` e
          `prescricoes`. QMDs de teste têm o prefixo `(Teste)`.
        data_type: string
      - name: localizacao_patrulha
        description: >
          Localização de atuação do QMD descrita por cruzamentos ou pontos de
          referência específicos (ex. "Rodoviária X Terminal Gentileza X Estação
          Leopoldina"). Campo descritivo — não é bairro nem zona administrativa.
          Para análise espacial usar as geometrias em `qmd_detalhes` ou `qmd_kml`.
          Não confundir com `area_planejamento` em `ocorrencias_historico`/`ocorrencias_ativas_v2`
          (código AP1.1 etc.) — são conceitos distintos.
        data_type: string
      - name: data_hora_vigencia_inicio
        description: Data e hora de início da vigência do QMD (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_vigencia_fim
        description: >
          Data e hora de fim da vigência do QMD (America/Sao_Paulo). Uma vigência
          tipicamente cobre ~3 meses (múltiplas semanas de operação).
        data_type: datetime
      - name: hora_inicio_qmd
        description: >
          Hora de início do turno diário de execução do QMD. Segue o padrão
          `hora_inicio_*`/`hora_fim_*` de `qmd_kml`. Pode ser igual a `hora_fim_qmd`
          em casos não documentados (observado em 5 QMDs ativos).
        data_type: time
      - name: hora_fim_qmd
        description: >
          Hora de fim do turno diário de execução do QMD. Quando menor que
          `hora_inicio_qmd`, o turno cruza a meia-noite — usar `indicador_hora_cruza_meia_noite`.
        data_type: time
      - name: data_hora_criacao
        description: Data e hora de criação do QMD no sistema (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_autorizacao
        description: >
          Data e hora de autorização do QMD (America/Sao_Paulo). Nulo quando
          `indicador_autorizado = false`.
        data_type: datetime
      - name: indicador_ativo
        description: Indica se o QMD está ativo no momento da coleta.
        data_type: bool
      - name: indicador_valido
        description: >
          Indica se o QMD é considerado válido pelo sistema. O critério exato não
          está documentado na API — não usar como filtro de qualidade sem confirmar
          com a equipe da GM.
        data_type: bool
      - name: indicador_autorizado
        description: Indica se o QMD foi formalmente autorizado.
        data_type: bool
      - name: resumo
        description: >
          Texto livre com o resumo operacional do QMD. Sempre preenchido
          (média ~1.300 caracteres).
        data_type: string
      - name: prescricoes
        description: >
          Texto livre com as prescrições detalhadas do QMD. Sempre preenchido
          (média ~1.050 caracteres).
        data_type: string
      - name: indicador_hora_cruza_meia_noite
        description: >
          True quando `hora_fim_qmd < hora_inicio_qmd`, indicando que o turno
          atravessa a meia-noite (ex. início 22:00, fim 02:00). Usado internamente
          por `duracao_minutos_qmd` — não é necessário tratá-lo no mart.
        data_type: bool
      - name: duracao_minutos_qmd
        description: >
          Duração do turno diário em minutos, calculada a partir de `hora_inicio_qmd`
          e `hora_fim_qmd` com correção automática para turnos que cruzam a
          meia-noite (`indicador_hora_cruza_meia_noite`). Pronto para uso direto
          em agregações — não requer o `IF(indicador_hora_cruza_meia_noite, ...)`
          no mart. Valores observados: ~720 min (12h) a ~720 min (turnos noturnos 20:00→08:00).
        data_type: int64
      - name: data_particao
        description: Data de partição, equivalente à data de execução da pipeline que gerou a linha.
        data_type: date
