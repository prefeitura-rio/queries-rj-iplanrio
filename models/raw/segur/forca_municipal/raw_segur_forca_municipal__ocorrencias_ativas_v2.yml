version: 2

models:
  - name: raw_segur_forca_municipal__ocorrencias_ativas_v2
    description: >
      Série temporal de snapshots intradiários das ocorrências ativas no sistema HxGN OnCall
      da Guarda Municipal do Rio de Janeiro. Cada linha representa o estado de 1 ocorrência
      ativa em 1 momento específico (polling a cada 5 min). Uma ocorrência ativa durante 2h
      gera ~24 linhas na partição do dia. Ocorrências fechadas desaparecem do endpoint e
      não são retroativamente atualizadas nesta tabela — usar ocorrencias_historico para
      histórico completo. Versão estendida de ocorrencias_ativas: inclui localização
      (Latitude, Longitude, Location, geometry) e timeline de despacho (3 timestamps),
      sem AgencyId, IsOpen, SubstatusCode presentes na v1.
      Frequência de atualização: a cada 5 minutos.
      Fonte: GET /api/ocorrencias/ativas (v2).
      Órgão gestor dos dados: SEGUR / Força Municipal.
    config:
      alias: ocorrencias_ativas_v2
      schema: brutos_forca_municipal
    columns:
      - name: id_hash
        description: Hash MD5 de 16 hex calculado **por linha** sobre as colunas da API (excluindo `updated_at`). Mesmo conteúdo = mesmo hash entre runs. Identifica linhas únicas e detecta duplicatas de fonte.
        data_type: string
      - name: updated_at
        description: Datetime da coleta dos dados pela pipeline (America/Sao_Paulo).
        data_type: datetime
      - name: id_unidade_primaria
        description: Identificador da unidade principal atribuída à ocorrência (ex. VTR01-LITORANEA).
        data_type: string
      - name: id_esz
        description: Código da zona estatística de segurança (ESZ) onde a ocorrência está registrada.
        data_type: string
      - name: id_grupo_usuario
        description: Identificador do grupo de usuário responsável pelo registro.
        data_type: string
      - name: id_funcionario_criacao
        description: Identificador do funcionário que criou a ocorrência.
        data_type: string
      - name: id_funcionario_primario
        description: Identificador do funcionário primário responsável.
        data_type: string
      - name: id_funcionario_fechamento
        description: Identificador do funcionário que fechou a ocorrência.
        data_type: string
      - name: id_ocorrencia
        description: Identificador único da ocorrência (ex. FORCA2026010200233).
        data_type: string
      - name: tipo_ocorrencia_codigo
        description: Código do tipo da ocorrência (ex. A, DIO, F).
        data_type: string
      - name: tipo_ocorrencia_descricao
        description: Descrição do tipo da ocorrência (ex. Abordagem, Dado de inteligência operacional).
        data_type: string
      - name: subtipo_ocorrencia_codigo
        description: Código do subtipo da ocorrência.
        data_type: string
      - name: subtipo_ocorrencia_descricao
        description: Descrição do subtipo da ocorrência.
        data_type: string
      - name: descricao_ocorrencia
        description: Descrição textual livre da ocorrência.
        data_type: string
      - name: data_hora_criacao
        description: Data e hora em que a ocorrência foi criada (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_primeiro_despacho
        description: Data e hora do primeiro despacho de unidade para a ocorrência (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_primeira_unidade_a_caminho
        description: Data e hora em que a primeira unidade entrou em rota para a ocorrência (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_primeira_chegada
        description: Data e hora em que a primeira unidade chegou ao local da ocorrência (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_ultima_mudanca_status
        description: Data e hora da última mudança de status da ocorrência (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_mudanca_prioridade
        description: Data e hora em que a prioridade da ocorrência foi alterada (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_atualizacao_bd
        description: Data e hora da última atualização do registro no banco de dados do sistema (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_fechamento
        description: Data e hora em que a ocorrência foi fechada (America/Sao_Paulo).
        data_type: datetime
      - name: prioridade
        description: Nível de prioridade da ocorrência (ex. 1 a 9).
        data_type: string
      - name: id_status
        description: Identificador do status atual da ocorrência no sistema.
        data_type: string
      - name: comentario_fechamento
        description: Comentário registrado no momento do fechamento da ocorrência.
        data_type: string
      - name: area_planejamento
        description: >
          Código da área de planejamento municipal (ex. AP1.1, AP2.1, AP5.2).
          Não confundir com `localizacao_patrulha` em `qmd`/`qmd_detalhes`
          (descrição textual de cruzamentos) — são conceitos distintos.
        data_type: string
      - name: setor
        description: Setor ou bairro de patrulhamento (ex. Cidade Nova, Copacabana).
        data_type: string
      - name: distrito
        description: Distrito onde a ocorrência foi registrada (ex. Rio Comprido, Portuária).
        data_type: string
      - name: zona
        description: Zona geográfica ampla (ex. Centro, Zona Sul).
        data_type: string
      - name: grupo_despacho
        description: Grupo de despacho responsável pela ocorrência (ex. 4 Aisp - São Cristóvão).
        data_type: string
      - name: localizacao
        description: Endereço textual do local da ocorrência.
        data_type: string
      - name: agentes
        description: >
          Lista de agentes atribuídos à ocorrência (formato JSON serializado).
          Sempre NULL neste endpoint (v2) — campo presente na v1 mas não populado pela API.
          Não parsear.
        data_type: string
      - name: atributos
        description: Código de atributos adicionais da ocorrência (pode representar bitmask de flags internas).
        data_type: string
      - name: dados_customizados
        description: >
          Informações adicionais em formato JSON definidas pela agência.
          Conteúdo invariante observado: {"Estado":"Informado"} — sem valor analítico.
          Mesmo comportamento observado em ocorrencias_historico.
        data_type: string
      - name: indicador_desvio_missao
        description: >
          True se `tipo_ocorrencia_codigo = 'DM'` (Desvio de Missão) — evento operacional
          interno gerado quando uma viatura sai da área de missão planejada. Excluir de
          todas as análises P1. Ver também `indicador_evento_operacional` para filtro
          mais abrangente.
        data_type: bool
      - name: indicador_evento_operacional
        description: >
          True se `tipo_ocorrencia_codigo IN ('DM', 'AGD')` — cobre todos os tipos
          operacionais internos que não representam crime. Mesmo critério de
          `ocorrencias_historico.indicador_evento_operacional`. Usar
          `WHERE NOT indicador_evento_operacional` como filtro-base de P1.
        data_type: bool
      - name: latitude
        description: Coordenada geográfica de latitude do local da ocorrência.
        data_type: float64
      - name: longitude
        description: Coordenada geográfica de longitude do local da ocorrência.
        data_type: float64
      - name: geometry
        description: Ponto geográfico derivado de latitude e longitude via ST_GEOGPOINT.
        data_type: geography
      - name: ttd_segundos
        description: >
          Time to Dispatch em segundos: `DATETIME_DIFF(data_hora_primeiro_despacho,
          data_hora_criacao, SECOND)`. Métrica central de P4. NULL quando
          `data_hora_primeiro_despacho IS NULL` (ocorrências sem despacho de unidade,
          ex. tipo `OT`, `DIO`).
        data_type: int64
      - name: tter_segundos
        description: >
          Time to Enroute em segundos: `DATETIME_DIFF(data_hora_primeira_unidade_a_caminho,
          data_hora_primeiro_despacho, SECOND)`. Tempo entre o despacho e a unidade
          entrar em rota. NULL quando `data_hora_primeira_unidade_a_caminho IS NULL`.
        data_type: int64
      - name: ttoa_segundos
        description: >
          Time on Arrival em segundos: `DATETIME_DIFF(data_hora_primeira_chegada,
          data_hora_primeiro_despacho, SECOND)`. Tempo entre o despacho e a unidade
          chegar ao local. NULL quando `data_hora_primeira_chegada IS NULL`.
        data_type: int64
      - name: data_particao
        description: >
          Data de partição da carga incremental, correspondente à data do run (America/Sao_Paulo).
          Cada partição acumula todos os snapshots de 5 min do dia. Padrão normal — diferente
          de unit_positions onde data_particao = D-1 (data de coleta do GPS).
        data_type: date
