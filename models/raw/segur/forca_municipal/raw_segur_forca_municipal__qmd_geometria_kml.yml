version: 2

models:
  - name: raw_segur_forca_municipal__qmd_geometria_kml
    description: >
      Base model: todas as features KML exportadas pelo sistema QMD, todas as pastas.
      Centraliza todas as transformações (parsing de extended_data, geometry, dedup).
      Modelos derivados apenas filtram por tipo_missao ou kml_folder — sem lógica própria.
      Pastas conhecidas: 'Missões' (missões operacionais) e 'QMD' (localização das bases).
      Frequência de atualização: diária.
      Fonte: GET /api/qmd/kml.
      Órgão gestor dos dados: SEGUR / Força Municipal.
    columns:
      - name: id_hash
        description: >
          Hash MD5 de 32 hex calculado sobre as colunas da API (excluindo updated_at).
          Chave única — uma linha por versão de feature KML.
        data_type: string
        tests:
          - not_null
          - unique
      - name: first_seen
        description: Datetime da primeira coleta em que esta versão foi observada.
        data_type: datetime
      - name: last_seen
        description: Datetime da última coleta em que esta versão foi observada.
        data_type: datetime
      - name: updated_at
        description: Igual a last_seen.
        data_type: datetime
      - name: data_particao
        description: Data da partição mais recente em que esta versão foi observada.
        data_type: date
      - name: id_qmd
        description: Identificador do QMD. FK para qmd, qmd_missoes, qmd_bases.
        data_type: string
      - name: id_missao
        description: >
          Identificador da missão. NULL para features da pasta QMD (bases).
          FK para qmd_missoes.id_missao.
        data_type: string
      - name: kml_folder
        description: >
          Nome da pasta KML normalizado (lowercase, sem acentos).
          Valores conhecidos: 'missoes' (pasta Missões) e 'qmd' (pasta QMD).
          Usar para filtrar nos modelos derivados.
        data_type: string
      - name: kml_folder_raw
        description: Valor original de kml_folder antes de normalização.
        data_type: string
      - name: nome
        description: Nome da feature KML.
        data_type: string
      - name: tipo_missao
        description: >
          Tipo da missão. Valores: PTR, PB, RF, SV, SP.
          NULL para features da pasta QMD (bases).
        data_type: string
      - name: tipo_missao_nome
        description: >
          Nome do tipo de missão. Traduzido de tipo_missao via macro tipo_missao_nome.
          Valores: 'posto' (PB), 'patrulhamento' (PTR), 'refeicao' (RF),
          'supervisao' (SV), 'suporte' (SP).
          NULL para features da pasta QMD (bases) e siglas não mapeadas.
        data_type: string
      - name: tipo_geometria
        description: >
          Tipo da geometria: LINESTRING (PTR), POINT (PB/QMD), POLYGON (RF/SV/SP).
        data_type: string
      - name: tipo_operacional
        tests:
          - not_null
        description: >
          Classificação operacional da feature, derivada de múltiplos sinais (kml_folder,
          id_missao, tipo_missao, tipo_geometria, ST_AREA) para robustez. NULL quando os
          sinais discordam — indica inconsistência no dado fonte. Valores:
          'sede' — localização física do QMD (kml_folder='qmd' + id_missao IS NULL);
          'patrulha' — rota PTR (tipo_missao='PTR' + LINESTRING);
          'posto' — ponto fixo PB (tipo_missao='PB' + POINT);
          'area' — polígono RF/SV/SP de base inteira >10 km², sem valor analítico;
          'subarea' — polígono RF/SV/SP de subárea operacional ≤10 km².
        data_type: string
      - name: indicador_geometry_util
        description: >
          FALSE apenas para polígonos de base inteira (tipo_operacional = 'area', ST_AREA > 10 km²).
          TRUE para todo o resto: sede, patrulha, posto e subarea são sempre úteis.
          Usar como filtro primário em análises de conformidade espacial.
        data_type: bool
      - name: hora_inicio_missao
        description: Hora de início planejada. Extraída de dados_extendidos.HoraInicio. NULL para bases.
        data_type: time
      - name: hora_fim_missao
        description: Hora de fim planejada. Extraída de dados_extendidos.HoraFim. NULL para bases.
        data_type: time
      - name: roteiro_raw
        description: >
          Valor bruto de $.Roteiro da API, apenas com trim aplicado. Preserva prefixos
          de tipo (ex: "RF\t", "SUPERVISÃO\t") e acentuação original. Usado internamente
          como sinal de redundância textual na classificação de tipo_operacional:
          'area da base' → exclusivo de polígonos de base inteira;
          'dentro da subarea' → exclusivo de subáreas operacionais.
          NULL para features da pasta QMD (bases) e missões sem roteiro definido.
        data_type: string
      - name: roteiro
        description: >
          Descrição textual do roteiro/área. Prefixo de tipo (ex: "RF\t", "PTR_01\t") e
          prefixo "Dentro da Subárea" removidos na transformação — inconsistência do dado
          fonte onde o mesmo geometry aparecia com e sem o prefixo.
          NULL para features da pasta QMD.
        data_type: string
      - name: servicos
        description: >
          Unidades alocadas à missão. ARRAY<STRING> de valores distintos.
          Array vazio para bases ou missões sem alocação.
        data_type: "array<string>"
      - name: descricao
        description: HTML com atributos da feature.
        data_type: string
      - name: dados_extendidos
        description: JSON bruto com metadados. NULL para features da pasta QMD.
        data_type: string
      - name: geometria_wkt
        description: Geometria em formato WKT.
        data_type: string
      - name: geometry
        description: >
          Geometria como GEOGRAPHY, pronta para funções ST_*.
          Derivada de geometria_wkt via SAFE.ST_GEOGFROMTEXT(..., make_valid => TRUE).
        data_type: geography
