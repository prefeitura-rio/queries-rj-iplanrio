version: 2

models:
  - name: raw_segur_forca_municipal__qmd_geometria_missoes_subarea
    description: >
      Subáreas operacionais RF/SV/SP com ST_AREA ≤ 10 km² — zona específica de missão.
      Derivado de qmd_geometria_kml, filtra por tipo_operacional = 'subarea'.
      Para polígonos de base inteira (> 10 km²), usar qmd_geometria_missoes_area.
      Join canônico: qmd_missoes LEFT JOIN qmd_geometria_missoes_subarea USING (id_missao).
      Frequência de atualização: diária.
      Órgão gestor dos dados: SEGUR / Força Municipal.
    columns:
      - name: id_hash
        description: >
          Hash MD5 estável sobre campos estruturais (id_qmd, id_missao, geometria_wkt,
          tipo_missao, hora_inicio/fim, roteiro_raw). Exclui descricao e servicos.
          Chave única — 1 linha por geometry distinta. Herdado de qmd_geometria_kml.
        data_type: string
        tests:
          - not_null
          - unique
      - name: id_hash_original
        description: Hash original do pipeline upstream rj-segur. Volátil — mantido para rastreabilidade.
        data_type: string
        tests:
          - not_null
      - name: first_seen
        description: Datetime da primeira coleta desta versão.
        data_type: datetime
      - name: last_seen
        description: Datetime da última coleta desta versão.
        data_type: datetime
      - name: updated_at
        description: Igual a last_seen.
        data_type: datetime
      - name: data_particao
        description: Data da partição mais recente desta versão.
        data_type: date
      - name: id_qmd
        description: Identificador do QMD. FK para qmd.
        data_type: string
      - name: id_missao
        description: Identificador da missão. FK para qmd_missoes.id_missao.
        data_type: string
      - name: nome
        description: Nome da feature KML.
        data_type: string
      - name: tipo_missao
        description: "Tipo da missão. Valores nesta tabela: 'RF', 'SV', 'SP'."
        data_type: string
      - name: tipo_missao_nome
        description: "Nome do tipo. Valores nesta tabela: 'refeicao', 'supervisao', 'suporte'."
        data_type: string
      - name: tipo_geometria
        description: Sempre 'POLYGON' nesta tabela.
        data_type: string
      - name: tipo_operacional
        description: Sempre 'subarea' nesta tabela.
        data_type: string
      - name: hora_inicio_missao
        description: Hora de início planejada da missão de área.
        data_type: time
      - name: hora_fim_missao
        description: Hora de fim planejada da missão de área.
        data_type: time
      - name: roteiro
        description: >
          Nome da subárea ou descrição da zona operacional, sem prefixos de tipo
          ou "Dentro da Subárea" (removidos na transformação do base model).
          100% preenchido.
        data_type: string
      - name: id_roteiro
        description: Slug do roteiro. Agrupador para filtros — todas as geometrias com mesmo roteiro. 100% preenchido.
        data_type: string
        tests:
          - not_null
      - name: id_subarea
        description: >
          Igual a id_roteiro para linhas desta tabela — a subárea identifica-se com
          sua própria zona.
          Join direto: patrulha.id_subarea = subarea.id_roteiro (= subarea.id_subarea).
        data_type: string
      - name: id_area
        description: >
          Slug da área de base inteira à qual esta subárea pertence geograficamente.
          Join primário: mesmo QMD + ST_INTERSECTS. Fallback: area mais próxima de
          qualquer QMD via ST_DISTANCE.
          NULL apenas quando não existem areas cadastradas em nenhum QMD.
        data_type: string
      - name: servicos
        description: Unidades alocadas a esta subárea. ARRAY<STRING> de valores distintos.
        data_type: "array<string>"
      - name: descricao
        description: HTML com atributos da missão.
        data_type: string
      - name: dados_extendidos
        description: JSON bruto com metadados da missão.
        data_type: string
      - name: geometria_wkt
        description: Geometria Polygon em formato WKT.
        data_type: string
      - name: geometry
        description: >
          Geometria Polygon como GEOGRAPHY. Usar ST_WITHIN para verificar
          se um ponto GPS está dentro da subárea planejada.
        data_type: geography

