version: 2

models:
  - name: raw_segur_forca_municipal__qmd_geometria_missoes_posto
    description: >
      Pontos de bloqueio (PB) — geometria Point.
      Derivado de qmd_missoes (filtro: tipo_operacional = 'posto').
      Grain: (id_missao, id_servico) — um ponto por posto por plano semanal.
      Inclui apenas missões com unidade alocada — sem missões sem planejamento.
      Para o mapa completo incluindo missões não alocadas, usar qmd_geometria_kml.
      Frequência de atualização: diária.
      Órgão gestor dos dados: SEGUR / Força Municipal.
    columns:
      - name: id_hash
        description: >
          Hash MD5 herdado de qmd_missoes. Chave única por plano semanal:
          (id_qmd, id_missao, id_servico, tipo_missao, roteiro, hora_inicio/fim,
          dias, execucoes, geometria_wkt). Um ponto por posto por semana de plano.
        data_type: string
        tests:
          - not_null
          - unique
      - name: id_qmd
        description: Identificador do QMD.
        data_type: string
      - name: id_missao
        description: Identificador da missão. Estável — não muda entre semanas para o mesmo ponto.
        data_type: string
      - name: id_servico
        description: Identificador do plano semanal desta unidade. Muda a cada semana de planejamento.
        data_type: string
      - name: id_unidade
        description: Unidade alocada a este posto no plano semanal. Ex. 'POG01-LITORANEA'.
        data_type: string
      - name: tipo_missao
        description: Sempre 'PB' nesta tabela.
        data_type: string
      - name: tipo_missao_nome
        description: Sempre 'posto' nesta tabela.
        data_type: string
      - name: tipo_operacional
        description: Sempre 'posto' nesta tabela.
        data_type: string
      - name: tipo_geometria
        description: Sempre 'POINT' nesta tabela.
        data_type: string
      - name: hora_inicio_missao
        description: Hora de início planejada do bloqueio.
        data_type: time
      - name: hora_fim_missao
        description: Hora de fim planejada do bloqueio.
        data_type: time
      - name: roteiro
        description: Descrição do ponto de bloqueio, com prefixo de tipo removido.
        data_type: string
      - name: roteiro_raw
        description: Valor bruto do campo roteiro da API, com apenas trim aplicado.
        data_type: string
      - name: id_roteiro
        description: Slug do roteiro. Agrupador estável independente do plano semanal.
        data_type: string
        tests:
          - not_null
      - name: id_subarea
        description: >
          Slug da subárea à qual este posto pertence. Computado via equi-join
          (id_qmd, id_servico) contra o RF do mesmo plano semanal — 100% cobertura,
          join 1:1 por construção.
        data_type: string
      - name: id_area
        description: >
          Slug da área de base inteira (>10 km²) à qual este posto pertence.
          Equi-join primário (id_qmd, id_servico); fallback ST_DISTANCE cross-QMD.
        data_type: string
      - name: execucoes
        description: >
          Janelas temporais desta missão no plano semanal.
          ARRAY<STRUCT<data_hora_inicio, data_hora_fim, week_day, week_day_number>>.
        data_type: >
          array<struct<data_hora_inicio datetime, data_hora_fim datetime,
          week_day string, week_day_number int64>>
      - name: dias
        description: Dias da semana programados. ARRAY<STRUCT<week_day, week_day_number>>.
        data_type: array<struct<week_day string, week_day_number int64>>
      - name: indicador_ativo
        description: TRUE se o QMD pai está ativo no momento da coleta.
        data_type: bool
      - name: geometria_wkt
        description: Geometria Point em formato WKT.
        data_type: string
      - name: geometry
        description: >
          Geometria Point como GEOGRAPHY. Usar ST_DWITHIN com tolerância de 150m
          para verificar conformidade de posto fixo.
        data_type: geography
