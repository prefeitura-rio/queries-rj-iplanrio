version: 2

models:
  - name: raw_segur_forca_municipal__qmd_servicos
    description: >
      Serviços (unidades) vinculados a cada Quadro de Missão Diária (QMD) no sistema
      HxGN OnCall. Cada linha representa a atribuição de uma unidade a um QMD em um
      plano semanal, com os dias da semana em que o serviço está ativo.
      Frequência de atualização: diária.
      Fonte: GET /api/qmd/servicos.
      Órgão gestor dos dados: SEGUR / Força Municipal.
    columns:
      - name: id_hash
        description: >
          Hash md5 de 32 hex calculado **por linha** sobre as colunas da API (excluindo
          `updated_at`). Chave única desta tabela — uma linha por versão de conteúdo.
          Mesmo conteúdo = mesmo hash entre runs.
        data_type: string
        tests:
          - not_null
          - unique
      - name: first_seen
        description: >
          Datetime da primeira coleta em que esta versão do registro (`id_hash`) foi
          observada. Derivado de `MIN(updated_at)`. Imutável após o insert.
        data_type: datetime
      - name: last_seen
        description: >
          Datetime da última coleta em que esta versão do registro foi observada.
          Derivado de `MAX(updated_at)`. Congela quando o registro muda (novo `id_hash`)
          ou é removido da API — serve como `valid_until` implícito.
        data_type: datetime
      - name: updated_at
        description: >
          Datetime da coleta mais recente em que esta versão foi observada (America/Sao_Paulo).
          Igual a `last_seen` — mantido para compatibilidade com o padrão do dataset.
        data_type: datetime
      - name: data_particao
        description: >
          Data da partição mais recente em que esta versão foi observada. Equivalente a
          `DATE(last_seen)`. Mantido para compatibilidade com o padrão do dataset.
        data_type: date
      - name: id_plano
        description: Identificador do plano semanal ao qual este serviço pertence.
        data_type: string
      - name: id_qmd
        description: Identificador do QMD ao qual este serviço pertence.
        data_type: string
      - name: id_servico
        description: Identificador único do serviço (vinculação unidade-QMD-plano).
        data_type: string
      - name: id_unidade
        description: >
          Identificador da unidade alocada ao serviço, no formato `TIPO##-BASE`
          (ex. `POG01-LITORANEA`, `MOT02-NORTE`). Equivalente a `id_unidade` em
          `unit_positions` e `unidades_historico` — chave de join entre planejamento
          e execução.
        data_type: string
      - name: dias
        description: >
          Dias da semana em que o serviço está ativo, como `ARRAY<STRING>`.
          Abreviações em português: `"dom"`, `"seg"`, `"ter"`, `"qua"`, `"qui"`,
          `"sex"`, `"sab"`. A ordem dos elementos varia entre registros. Em produção,
          99,8% dos serviços têm os 7 dias — o campo é minimamente discriminante
          no estado atual. Mesmo tipo e semântica que `qmd_missoes.dias`.
        data_type: array<string>
      - name: tipo_unidade
        description: >
          Tipo da viatura, extraído do prefixo alfabético de `nome`
          (ex. `POG01-LITORANEA` → `POG`). Consistente com
          `unit_positions.tipo_unidade` e `unidades_historico.tipo_unidade`.
        data_type: string
      - name: base_operacional
        description: >
          Base operacional da viatura, extraída do sufixo de `nome`
          (ex. `POG01-LITORANEA` → `LITORANEA`). Valores: `NORTE`, `OESTE`,
          `LITORANEA`. Chave de join com `qmd_plano.area`.
        data_type: string

