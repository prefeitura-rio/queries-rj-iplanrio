version: 2

models:
  - name: raw_segur_forca_municipal__qmd_geometria_sede
    description: >
      Localização física (ponto) de cada QMD — onde a base operacional está instalada.
      Uma linha por QMD. Fonte: pasta `QMDs` do endpoint GET /api/qmd/kml.
      Frequência de atualização: diária.
      Órgão gestor dos dados: SEGUR / Força Municipal.
    columns:
      - name: id_hash
        description: >
          Hash MD5 estável sobre campos estruturais (id_qmd, id_missao, geometria_wkt,
          tipo_missao, hora_inicio/fim, roteiro_raw). Exclui descricao e servicos.
          Chave única — 1 linha por geometry distinta. Herdado de qmd_geometria_kml.
        data_type: string
        tests:
          - not_null
          - unique
      - name: id_hash_original
        description: Hash original do pipeline upstream rj-segur. Volátil — mantido para rastreabilidade.
        data_type: string
        tests:
          - not_null
      - name: first_seen
        description: >
          Datetime da primeira coleta em que esta versão do registro foi observada.
          Derivado de `MIN(updated_at)`. Imutável após o insert.
        data_type: datetime
      - name: last_seen
        description: >
          Datetime da última coleta em que esta versão do registro foi observada.
          Derivado de `MAX(updated_at)`. Congela quando o conteúdo muda ou o QMD
          é removido da API.
        data_type: datetime
      - name: updated_at
        description: >
          Datetime da coleta mais recente em que esta versão foi observada
          (America/Sao_Paulo). Igual a `last_seen`.
        data_type: datetime
      - name: data_particao
        description: >
          Data da partição mais recente em que esta versão foi observada.
          Equivalente a `DATE(last_seen)`.
        data_type: date
      - name: id_qmd
        description: >
          Identificador do QMD. FK para `qmd`, `qmd_missoes` e `qmd_missoes_geometria`.
        data_type: string
      - name: nome
        description: >
          Nome da feição KML. Sempre `"Informações Do Qmd"` para estas linhas.
        data_type: string
      - name: tipo_geometria
        description: >
          Tipo da geometria. Sempre `POINT` para linhas desta tabela — cada QMD
          tem exatamente um ponto de localização.
        data_type: string
      - name: tipo_operacional
        description: Sempre 'sede' nesta tabela.
        data_type: string
      - name: id_subarea
        description: >
          Slug da subárea em que a sede está localizada geograficamente.
          Join primário: mesmo QMD + ST_INTERSECTS. Fallback: subarea mais próxima de
          qualquer QMD via ST_DISTANCE — cobre casos onde a sede fica na borda do polígono.
          NULL quando não existem subareas cadastradas em nenhum QMD.
        data_type: string
      - name: id_area
        description: >
          Slug da área de base inteira em que a sede está localizada geograficamente.
          Join primário: mesmo QMD + ST_INTERSECTS. Fallback: area mais próxima de
          qualquer QMD via ST_DISTANCE.
          NULL quando não existem areas cadastradas em nenhum QMD.
        data_type: string
      - name: descricao
        description: >
          HTML com atributos do QMD exportados pelo sistema: nome, resumo.
          Sempre preenchido.
        data_type: string
      - name: geometria_wkt
        description: Coordenada do ponto da base em formato WKT (`POINT (lon lat)`).
        data_type: string
      - name: geometry
        description: >
          Coordenada da base como `GEOGRAPHY` (Point), pronta para funções `ST_*`.
          Derivada de `geometria_wkt` via `SAFE.ST_GEOGFROMTEXT(..., make_valid => TRUE)`.
        data_type: geography
