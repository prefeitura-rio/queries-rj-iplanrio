version: 2

models:
  - name: raw_segur_forca_municipal__ocorrencias_historico
    description: >
      Histórico de revisões de ocorrências no sistema HxGN OnCall da Guarda Municipal
      do Rio de Janeiro. Cada linha representa uma revisão (snapshot) do estado de uma
      ocorrência em um determinado momento.
      Frequência de atualização: diária.
      Fonte: GET /api/ocorrencias/historico.
      Órgão gestor dos dados: SEGUR / Força Municipal.
    config:
      alias: ocorrencias_historico
      schema: brutos_forca_municipal
    columns:
      - name: id_hash
        description: Hash MD5 de 16 hex calculado **por linha** sobre as colunas da API (excluindo `updated_at`). Mesmo conteúdo = mesmo hash entre runs. Identifica linhas únicas e detecta duplicatas de fonte.
        data_type: string
      - name: updated_at
        description: Datetime da coleta dos dados pela pipeline (America/Sao_Paulo).
        data_type: datetime
      - name: id_agencia
        description: Identificador da agência responsável (ex. FORCA).
        data_type: string
      - name: id_esz
        description: Código da zona estatística de segurança (ESZ) onde a ocorrência está registrada.
        data_type: string
      - name: id_grupo_usuario
        description: Identificador do grupo de usuário responsável pelo registro.
        data_type: string
      - name: id_funcionario_criacao
        description: Identificador do funcionário que criou a ocorrência.
        data_type: string
      - name: id_funcionario_original
        description: Identificador do funcionário original responsável pela ocorrência.
        data_type: string
      - name: id_funcionario_revisao
        description: Identificador do funcionário que realizou a revisão registrada.
        data_type: string
      - name: id_funcionario_fechamento
        description: Identificador do funcionário que fechou a ocorrência.
        data_type: string
      - name: id_ocorrencia
        description: Identificador único da ocorrência (ex. FORCA2026010200233).
        data_type: string
      - name: tipo_ocorrencia_codigo
        description: Código do tipo da ocorrência (ex. A, DIO, F).
        data_type: string
      - name: tipo_ocorrencia_descricao
        description: Descrição do tipo da ocorrência (ex. Abordagem, Dado de inteligência operacional).
        data_type: string
      - name: subtipo_ocorrencia_codigo
        description: Código do subtipo da ocorrência.
        data_type: string
      - name: subtipo_ocorrencia_descricao
        description: Descrição do subtipo da ocorrência.
        data_type: string
      - name: descricao_ocorrencia
        description: Descrição textual livre da ocorrência.
        data_type: string
      - name: data_hora_adicao
        description: Data e hora em que a ocorrência foi adicionada ao sistema (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_criacao
        description: Data e hora em que a ocorrência foi criada (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_inicio
        description: Data e hora de início da ocorrência (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_ultima_mudanca_status
        description: Data e hora da última mudança de status da ocorrência no momento da revisão (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_mudanca_prioridade
        description: Data e hora em que a prioridade foi alterada (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_revisao
        description: Data e hora desta revisão do registro (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_insercao_bd
        description: Data e hora da inserção do registro no banco de dados do sistema (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_fechamento
        description: Data e hora em que a ocorrência foi fechada (America/Sao_Paulo).
        data_type: datetime
      - name: data_hora_alarme_pendente
        description: Data e hora do alarme pendente associado à ocorrência (America/Sao_Paulo).
        data_type: datetime
      - name: prioridade
        description: Nível de prioridade da ocorrência no momento da revisão (ex. 1 a 9).
        data_type: string
      - name: nivel_alarme
        description: Nível de alarme associado à ocorrência no momento da revisão.
        data_type: string
      - name: id_status
        description: >
          Código numérico do status interno da ocorrência no momento da revisão.
          Valores observados: `7`, `8`, `16`, `22`, `12` — sem definição oficial
          na documentação da API. Não confundir com `indicador_aberta`, que é o
          indicador de negócio explícito.
        data_type: string
      - name: id_substatus
        description: Identificador do substatus da ocorrência no momento da revisão.
        data_type: string
      - name: indicador_aberta
        description: Indica se a ocorrência estava aberta no momento da revisão.
        data_type: bool
      - name: indicador_reaberta
        description: Indica se a ocorrência havia sido reaberta no momento da revisão.
        data_type: bool
      - name: total_unidades_atribuidas
        description: Quantidade de unidades atribuídas à ocorrência no momento da revisão.
        data_type: int64
      - name: numero_revisao
        description: Número sequencial desta revisão da ocorrência. Usar `ORDER BY numero_revisao DESC` para encontrar a revisão mais recente por `id_ocorrencia`.
        data_type: integer
      - name: comentario_fechamento
        description: Comentário registrado no fechamento da ocorrência.
        data_type: string
      - name: area_planejamento
        description: >
          Código da área de planejamento municipal (ex. AP1.1, AP2.1, AP5.2).
          Não confundir com `localizacao_patrulha` em `qmd`/`qmd_detalhes`
          (descrição textual de cruzamentos) — são conceitos distintos.
        data_type: string
      - name: setor
        description: Setor ou bairro de patrulhamento (ex. Cidade Nova, Copacabana).
        data_type: string
      - name: distrito
        description: Distrito onde a ocorrência foi registrada (ex. Rio Comprido, Portuária).
        data_type: string
      - name: municipio
        description: Município onde a ocorrência ocorreu (ex. Rio de Janeiro).
        data_type: string
      - name: zona
        description: Zona geográfica ampla (ex. Centro, Zona Sul).
        data_type: string
      - name: grupo_despacho
        description: Grupo de despacho responsável pela ocorrência (ex. 4 Aisp - São Cristóvão).
        data_type: string
      - name: atributos
        description: Código de atributos adicionais da ocorrência (pode representar bitmask de flags internas).
        data_type: string
      - name: dados_customizados
        description: >
          JSON com informações adicionais. Em produção, sempre `{"Estado":
          "Informado"}` — conteúdo invariante sem valor analítico no estado atual.
        data_type: string
      - name: informacao_suplementar
        description: Informação suplementar definida pelo usuário.
        data_type: string
      - name: indicador_desvio_missao
        description: >
          True se `tipo_ocorrencia_codigo = 'DM'` (Desvio de Missão) — evento operacional
          interno gerado quando uma viatura sai da área de missão planejada. Representa
          46,6% das ocorrências em produção. Excluir de todas as análises P1 que medem
          incidência criminal ou de segurança pública. Ver também `indicador_evento_operacional`
          para excluir DM + AGD de uma vez.
        data_type: bool
      - name: indicador_evento_operacional
        description: >
          True se `tipo_ocorrencia_codigo IN ('DM', 'AGD')` — cobre todos os tipos
          de ocorrência que representam eventos operacionais internos e não devem
          ser contados como crime em P1. `DM` = Desvio de Missão (46,6%), `AGD` =
          Agente Desmobilizado (0,5%). Usar `WHERE NOT indicador_evento_operacional`
          como filtro-base de P1.
        data_type: bool
      - name: indicador_ultima_revisao
        description: >
          True para a revisão mais recente de cada `id_ocorrencia` (maior `numero_revisao`).
          Elimina a necessidade de `QUALIFY ROW_NUMBER() OVER (PARTITION BY id_ocorrencia
          ORDER BY numero_revisao DESC) = 1` no mart. Usar `WHERE indicador_ultima_revisao`
          para obter o estado atual de cada ocorrência sem multi-contagem.
        data_type: bool
      - name: duracao_ocorrencia_minutos
        description: >
          Duração em minutos entre criação e fechamento da ocorrência
          (`DATETIME_DIFF(data_hora_fechamento, data_hora_criacao, MINUTE)`).
          NULL para ocorrências ainda abertas (60% do total em produção).
          Não requer DATETIME_DIFF no mart — campo pronto para histogramas de
          tempo de resolução e filtros de outliers.
        data_type: int64
      - name: data_particao
        description: >
          Data do run da pipeline. Como a tabela é materializada como `table`
          (substituição total a cada run), há um único valor em toda a tabela —
          o da última execução. Não representa a data das ocorrências; usar
          `data_hora_criacao` para filtros temporais.
        data_type: date
