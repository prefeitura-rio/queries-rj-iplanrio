version: 2

models:
  - name: raw_segur_forca_municipal__monitoramento_qualidade
    description: >
      Painel de frescor e volume para todas as tabelas do dataset `brutos_forca_municipal`.
      Uma linha por tabela. Atualizado a cada run como `materialized="table"`.

      Categorias de materialização e respectivo indicador de frescor:
      - **merge_dedup**: tabelas com `unique_key="id_hash"`, sem partição no destino.
        `ultima_atualizacao = max(last_seen)`; `inicio_historico = date(min(first_seen))`.
      - **partitioned_incremental**: `unit_positions` — `insert_overwrite` por dia de coleta GPS.
        `ultima_atualizacao = datetime(max(data_particao))`; `dias_atraso = 1` é normal por design (D-1).
      - **table**: `ocorrencias_historico` e `unidades_historico` — full refresh diário.
        `ultima_atualizacao = datetime(max(data_particao))`; `dias_atraso = 0` é normal.
    columns:
      - name: tabela
        description: Nome da tabela no dataset `brutos_forca_municipal`.
        data_type: string
      - name: tipo_materializacao
        description: >
          Estratégia de materialização da tabela: `merge_dedup`, `partitioned_incremental` ou `table`.
        data_type: string
      - name: total_linhas
        description: >
          Total de linhas na tabela destino. Para tabelas `merge_dedup`, equivale ao número
          de estados únicos rastreados (1 linha por `id_hash`). Para `partitioned_incremental`
          e `table`, equivale ao total de eventos/registros.
        data_type: int64
      - name: inicio_historico
        description: >
          Data mais antiga presente na tabela. Para `merge_dedup`: `date(min(first_seen))`.
          Para `partitioned_incremental`: `min(data_particao)`. Para `table`: `min(data_particao)`
          (sempre igual a `date(ultima_atualizacao)`, pois é full refresh).
        data_type: date
      - name: ultima_atualizacao
        description: >
          Timestamp mais recente de atualização dos dados (America/Sao_Paulo).
          Para `merge_dedup`: `max(last_seen)` — última vez que algum estado foi observado no feed.
          Para `partitioned_incremental` e `table`: `datetime(max(data_particao))`.
        data_type: datetime
      - name: dias_atraso
        description: >
          Diferença em dias entre a data atual (America/Sao_Paulo) e `date(ultima_atualizacao)`.
          Alertas por tipo: `merge_dedup` > 0 indica parada de polling; `partitioned_incremental`
          > 1 indica atraso (D-1 é normal); `table` > 0 indica falha no refresh diário.
        data_type: int64
      - name: hashes_duplicados
        description: >
          `count(*) - count(distinct id_hash)` — número de linhas com `id_hash` repetido na tabela.
          Para `merge_dedup`: deve ser sempre 0 (garantido pelo `unique_key` do merge); valor > 0
          indica violação da chave, o que não deveria ser possível.
          Para `partitioned_incremental` (`unit_positions`): valor > 0 indica a mesma posição GPS
          repetida dentro do conjunto total de partições — sinal de reprocessamento ou bug na ingestão.
          Para `table`: valor > 0 indica a API retornou o mesmo registro duas vezes no dump diário.
        data_type: int64
      - name: total_megabytes
        description: Tamanho lógico total da tabela em megabytes, derivado do INFORMATION_SCHEMA.
        data_type: float64
      - name: ultima_modificacao_bq
        description: >
          Timestamp da última modificação registrada pelo BigQuery (America/Sao_Paulo),
          derivado do INFORMATION_SCHEMA. Pode diferir de `ultima_atualizacao` caso o modelo
          tenha sido executado sem novos dados na fonte.
        data_type: datetime
