version: 2

models:
  - name: raw_recursos_humanos_ergon__averbacoes_contagem
    description: "**Descrição**: Nesta tabela são armazenadas informações referentes sobre finalidade de contagem e total do tempo de contagem referentes a períodos averbados pelos servidores.\n**Frequência de atualização**: Diária\n**Cobertura temporal**: Data do menor registro\n**Órgão gestor dos dados**: SMA\n**Publicado por**: Luciano Muniz Francisco\n**Publicado por (email)**: luciano.muniz@prefeitura.rio\n"
    columns:
      - name: id_funcionario
        description: Número do funcionário gerado pelo ERGON.
        data_type: string
        data_tests:
          - not_null:
              name: raw_recursos_humanos_ergon__averbacoes_contagem__id_funcionario__not_null
              config:
                severity: warn
      - name: id_vinculo
        description: Número do vínculo relativo ao pagamento.
        data_type: string
        data_tests:
          - not_null:
              name: raw_recursos_humanos_ergon__averbacoes_contagem__id_vinculo__not_null
              config:
                severity: warn
      - name: id_averbacao
        description: Chave gerada pelo banco para registro de averbação.
        data_type: string
      - name: finalidade
        description: Tipo da finalidade da averbação.
        data_type: string
        quote: true
      - name: dias
        description: Total de dias averbados para determinada finalidade.
        data_type: integer


