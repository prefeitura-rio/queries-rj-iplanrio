version: 2

models:
  - name: raw_recursos_humanos_ergon__matricula
    description: "**Descrição**: Matrículas dadas pela prefeitura do Rio de Janeiro para pessoas que devem receber pagamento ou para pessoas em outros casos de interesse da prefeitura do Rio de Janeiro\n**Frequência de atualização**: Diária\n**Cobertura temporal**: Data do menor registro\n**Órgão gestor dos dados**: SMA\n**Publicado por**: Luciano Muniz Francisco\n**Publicado por (email)**: luciano.muniz@prefeitura.rio\n"
    columns:
      - name: id_funcionario
        description: Número do funcionário. Número dado a pessoa que ganhou sua primeira matrícula da prefeitura do Rio de Janeiro.
        data_type: integer
        data_tests:
          - not_null:
              name: raw_recursos_humanos_ergon__matricula__id_funcionario__not_null
              config:
                severity: warn
      - name: id_matricula
        description: Número da matrícula vinculada ao funcionário. Pode haver mais de uma matrúcla para o mesmo funcionário.
        data_type: string
        quote: true


