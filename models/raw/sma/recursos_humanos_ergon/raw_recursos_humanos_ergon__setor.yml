version: 2

models:
  - name: raw_recursos_humanos_ergon__setor
    description: "**Descrição**: Setores existentes tanto na administração direta como indireta da prefeitura do Rio de Janeiro.\r\nOs setores são os mesmos do SICI.\n**Frequência de atualização**: Anual\n**Cobertura temporal**: Até data corrente\n**Órgão gestor dos dados**: SMFP/SUBGCC/CGRH\n**Publicado por**: Anderson Ferraz Carneiro\n**Publicado por (email)**: anderson.carneiro@rio.rj.gov.br\n"      
    columns:
      - name: id_setor
        description: Código do setor, dado pelo SICI.
        data_type: integer
      - name: id_setor_pai
        description: Código do setor superior na hierarquia. Indica a subordinação direta, dado pelo SICI .
        data_type: integer
      - name: data_inicio
        description: Data de início de vigência do registro do setor. Normalmente indica a entrada no organograma da época.
        data_type: date
      - name: data_fim
        description: Data de término de vigência do registro do setor. Normalmente indica a saída do organograma da época.
        data_type: date
      - name: nome
        description: Nome do setor, possivelmente abreviado pelo tamanho do atributo.
        data_type: string
        quote: true
      - name: nome_completo
        description: Nome completo setor.
        data_type: string
        quote: true
      - name: sigla
        description: Sigla do setor. Ex. FP/SUBGGC.
        data_type: string
        quote: true
      - name: id_empresa
        description: Código da empresa onde está localizada o setor, dado pelo SICI.
        data_type: integer
      - name: id_empresa_prevrio
        description: Código da empresa na PREVRIO.
        data_type: integer
      - name: id_secretaria
        description: Código da secretaria onde está o setor, dado pelo SICI.
        data_type: integer
      - name: extinto
        description: Indicador se o setor foi extinto (N ou S).
        data_type: string
        quote: true
      - name: updated_at
        description: Data da última atualização.
        data_type: timestamp
