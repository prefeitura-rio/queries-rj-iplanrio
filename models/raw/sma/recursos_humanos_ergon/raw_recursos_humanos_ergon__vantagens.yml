version: 2

models:
  - name: raw_recursos_humanos_ergon__vantagens
    description: "**Descrição**: Tabela que armazena informações sobre atributos cadastrados que representam vantagens (valores a receber) dos servidores. Os atributos podem se referir a situações funcionais que não geram repercursão financeira e apenas existem para fins de cadastro.\n**Frequência de atualização**: Nunca\n**Cobertura temporal**: Não informado\n**Órgão gestor dos dados**: Não informado\n**Publicado por**: Não informado\n**Publicado por (email)**: naoinformado@naoinformado.com\n"
    columns:
      - name: id_funcionario
        description: Identificador do funcionário, que pode estar repetido no caso do funcionário possua ou tenha possuído mais de 1 vínculo funcional com a PCRJ.
        data_type: integer
      - name: id_vinculo
        description: Número do vínculo da pessoa. O número é dado sequencialmente, com 1 para o primeiro vínculo, 2 para o segundo e assim por diante. Ex. Uma pessoa que é professora, e funcionária do IPLANRIO, tem dois vínculos.
        data_type: integer
      - name: nome_vantagem
        description: Nome da vantagem ou seja, descrição do valor a ser recebido pelo funcionário e que integra os registros do contracheque.
        data_type: string
      - name: data_inicio
        description: Data de início da vantagem
        data_type: date
      - name: data_final
        description: Data final da vantagem, permite campo nulo, o que significa que a vantagem ainda está válida
        data_type: date
      - name: valor_vantagem
        description: Valor da vantagem a ser recebido pelo funcionário.
        data_type: numeric
      - name: informacao_atributo
        description: Informação adicional sobre a vantagem, geralmente o campo contem lista de valores tabulados
        data_type: string
      - name: tipo_incorporacao_cargo_fiducia
        description: Campo que informa o tipo de incorporação de cargo de fidúcia, somente é utilizado quando o campo VANTAGEM se referir a alguma incorporação de cargo de fidúcia
        data_type: string
      - name: percentual_incorporacao_cargo_fiducia
        description: Percentual de incorporação de cargo de fidúcia
        data_type: numeric
      - name: incide_tabela_vencimentos
        description: Tabela de valores do cargo incorporado, somente é utilizado quando o campo VANTAGEM se referir a alguma incorporação de cargo de fidúcia.
        data_type: string
      - name: incide_tabela_simbolo
        description: Referência correspondente ao símbolo do cargo incorporado
        data_type: string
      - name: observacoes
        description: Observações adicionais sobre a vantagem.
        data_type: string
      - name: valor_complementar_1
        description: Valor adicional referente à vantagem, uma informação adicional que compõe a cantagem, pode ser um percentual, um valor financeiro, ou alguma informação categórica. Geralmente o campo possui lista de valores tabulados.
        data_type: numeric
