version: 2

models:
  - name: raw_recursos_humanos_ergon_pgm__ficha_financeira_contabil
    description: "**Descrição**: Valores de rubricas de fichas financeiras dos funcionários da Prefeitura da Cidade do Rio de Janeiro. Constam fichas desde o início do ERGON. Uma ficha financeira é um resumo do contracheque do servidor. Nesta tabela estão incluídas informações sobre a natureza da despesa e o plano trabalho.\n**Frequência de atualização**: Nunca\n**Cobertura temporal**: Não informado\n**Órgão gestor dos dados**: SUBGGC\n**Publicado por**: Não informado\n**Publicado por (email)**: nao.informado@gmail.com\n"
    columns:
      - name: mes_ano_folha
        description: Mês e ano da folha da ficha financeira.
        data_type: date
      - name: id_funcionario
        description: Número do funcionário gerado pelo ERGON.
        data_type: integer
      - name: id_vinculo
        description: Número do vínculo relativo ao pagamento.
        data_type: integer
      - name: id_pensionista
        description: Número do pensionista, caso o pagamento seja relativo a um pensionista.
        data_type: integer
      - name: numero_folha
        description: Número da folha da ficha financeira.
        data_type: integer
      - name: id_setor
        description: Código do setor onde o funcionário está lotado no período da folha.
        data_type: integer
      - name: id_secretaria
        description: Identificador da secretaria onde o funcionário está lotado no período da folha.
        data_type: integer
      - name: tipo_funcionario
        description: Tipo do funcionário (ex: servidor, terceirizado).
        data_type: string
      - name: detalhamento
        description: Descrição da coluna não disponível e sem documentação associada. Varia entre 0, 1, 2 e 3.
        data_type: integer
        quote: true
      - name: id_rubrica
        description: Código da rubrica, que é um código numérico que identifica a natureza do pagamento ou desconto.
        data_type: integer
        quote: true
      - name: tipo_rubrica
        description: Informação não descrita na documentação disponível. Varia entre 1,2,3 e 4.
        data_type: string
        quote: true
      - name: mes_ano_direito
        description: Mês e ano a que se refere o direito do pagamento ou desconto registrado na ficha financeira.
        data_type: date
        quote: true
      - name: desconto_vantagem
        description: Define se o registro da ficha financeira é um desconto (2) ou uma vantagem (1)
        data_type: integer
        quote: true
      - name: valor
        description: Valor do lançamento na ficha financeira.
        data_type: numeric
      - name: observacao
        description: Observações acerca do lançamento registrado na ficha financeira.
        data_type: string
        quote: true
      - name: tipo_classificacao
        description: Descrição da coluna não disponível e sem documentação associada.
        data_type: string
        quote: true
      - name: classificacao
        description: Código numérico sem informação de significado disponível na documentação.
        data_type: integer
        quote: true
      - name: id_empresa
        description: Identificador da empresa a qual a folha de pagamento pertence.
        data_type: integer
      - name: data_particao
        description: Data da partição dos dados.
        data_type: date
