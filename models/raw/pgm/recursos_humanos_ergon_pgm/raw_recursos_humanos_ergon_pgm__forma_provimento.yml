version: 2

models:
  - name: raw_recursos_humanos_ergon_pgm__forma_provimento
    description: "**Descrição**: Formas de provimentos possíveis tanto na administração direta como indireta da prefeitura do Rio de Janeiro. O provimento é a investidura em um cargo público.\n**Frequência de atualização**: Semanal\n**Cobertura temporal**: Até data corrente\n**Órgão gestor dos dados**: SMFP/SUBGCC/CGRH\n**Publicado por**: Anderson Ferraz Carneiro\n**Publicado por (email)**: anderson.carneiro@rio.rj.gov.br\n"
    columns:
      - name: id_forma_provimento
        description: Código numérico definido pelo gestor do Sistema que identifica a forma de provimento.
        data_type: integer
      - name: nome
        description: Nome da forma de provimento. Ex. NOMEACAO OU PROVIMENTO (relativo a sigla 01).
        data_type: string
      - name: inativo
        description: Indica que a forma de provimento é válida para funcionários inativos (S/N).
        data_type: string
      - name: primeiro_provimento
        description: Indica se a forma de provimento pode ser um primeiro provimento (S/N) ( quando se entra na prefeitura ).
        data_type: string
      - name: ativo
        description: Indica que a forma de provimento é válida para funcionários ativos (S/N).
        data_type: string
