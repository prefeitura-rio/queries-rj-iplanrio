version: 2

models:
  - name: raw_plano_educacional_individualizado_habilidade
    description: "Habilidades Avaliadas no PEI"
    columns:
      - name: id_habilidade
        description: "Identificador da habilidade"
        data_type: int64
        data_tests:
          - not_null:
              name: raw_plano_educacional_individualizado_habilidade__id_habilidade__not_null
              config:
                severity: error

      - name: id_grupamento
        description: "Identificador do grupamento"
        data_type: int64
        data_tests:
          - not_null:
              name: raw_plano_educacional_individualizado_habilidade__id_grupamento__not_null
              config:
                severity: error

      - name: id_disciplina
        description: "Identificador da disciplina"
        data_type: int64
        data_tests:
          - not_null:
              name: raw_plano_educacional_individualizado_habilidade__id_disciplina__not_null
              config:
                severity: error

      - name: id_eixo
        description: "Identificador do eixo"
        data_type: int64
        data_tests:
          - not_null:
              name: raw_plano_educacional_individualizado_habilidade__id_eixo__not_null
              config:
                severity: error

      - name: descricao_habilidade
        description: "Descrição da habilidade"
        data_type: string
        data_tests:
          - not_null:
              name: raw_plano_educacional_individualizado_habilidade__descricao_habilidade__not_null
              config:
                severity: error

      - name: nr_bimentre_habilidade
        description: "Número do bimestre da habilidade"
        data_type: int64
        data_tests:
          - not_null:
              name: raw_plano_educacional_individualizado_habilidade__nr_bimentre_habilidade__not_null
              config:
                severity: error

      - name: codigo_habilidade
        description: "Código da habilidade"
        data_type: string

      - name: situacao_habilidade
        description: "Situação da habilidade"
        data_type: int64

      - name: data_criacao_habilidade
        description: "Data de criação da habilidade"
        data_type: datetime

      - name: data_alteracao_habilidade
        description: "Data de alteração da habilidade"
        data_type: datetime

      - name: eh_pei
        description: "Indica se é habilidade do PEI"
        data_type: boolean
        data_tests:
          - not_null:
              name: raw_plano_educacional_individualizado_habilidade__eh_pei__not_null
              config:
                severity: error

      - name: loaded_at
        description: "Timestamp de quando o dado foi extraído do banco de dados de origem."
        data_type: timestamp

      - name: transformed_at
        description: "Timestamp de quando o dado foi transformado no dbt."
        data_type: timestamp
