version: 2

models:
  - name: raw_plano_educacional_individualizado_eixo
    description: "Eixos educacionais do PEI"
    columns:
      - name: id_grupamento
        description: "Identificador do grupamento"
        data_type: int64
        data_tests:
          - not_null:
              name: raw_plano_educacional_individualizado_eixo__id_grupamento__not_null
              config:
                severity: error
          - relationships:
              name: raw_plano_educacional_individualizado_eixo__id_grupamento__relationships
              config:
                severity: error
              arguments:
                to: ref('raw_plano_educacional_individualizado_grupamento')
                field: id_grupamento

      - name: id_disciplina
        description: "Identificador da disciplina"
        data_type: int64
        data_tests:
          - not_null:
              name: raw_plano_educacional_individualizado_eixo__id_disciplina__not_null
              config:
                severity: error
          - relationships:
              name: raw_plano_educacional_individualizado_eixo__id_disciplina__relationships
              config:
                severity: error
              arguments:
                to: ref('raw_plano_educacional_individualizado_disciplina')
                field: id_disciplina

      - name: id_eixo
        description: "Identificador do eixo"
        data_type: int64
        data_tests:
          - not_null:
              name: raw_plano_educacional_individualizado_eixo__id_eixo__not_null
              config:
                severity: error
          - unique:
              name: raw_plano_educacional_individualizado_eixo__id_eixo__unique
              config:
                severity: error

      - name: nome_eixo
        description: "Nome do eixo"
        data_type: string
        data_tests:
          - not_null:
              name: raw_plano_educacional_individualizado_eixo__nome_eixo__not_null
              config:
                severity: error

      - name: objetivo_conhecimento_eixo
        description: "Objetivos de conhecimento do eixo"
        data_type: string

      - name: loaded_at
        description: "Timestamp de quando o dado foi extraído do banco de dados de origem."
        data_type: timestamp

      - name: transformed_at
        description: "Timestamp de quando o dado foi transformado no dbt."
        data_type: timestamp
