version: 2

sources:
  - name: brutos_plano_educacional_individualizado_staging
    description: "Dados brutos do Plano Educacional Individualizado (PEI) da Secretaria Municipal de Educação do Rio de Janeiro (SME-Rio)"
    database: rj-iplanrio
    schema: brutos_plano_educacional_individualizado_staging
    tables:
      - name: PEI_Grupamento
        description: "Grupamentos educacionais utilizados para organização e classificação dos planos educacionais individualizados."
      - name: PEI_Eixo
        description: "Eixos educacionais que organizam os objetivos de conhecimento dentro das disciplinas do PEI."
      - name: PEI_GrupamentoDisciplina
        description: "Relação entre grupamentos e disciplinas, definindo quais disciplinas pertencem a cada grupamento."
      - name: PEI_Habilidade
        description: "Habilidades avaliadas e desenvolvidas no contexto do Plano Educacional Individualizado."
      - name: PEI
        description: "Tabela principal contendo os detalhes dos Planos Educacionais Individualizados, incluindo estratégias, recursos e resultados esperados."
      - name: PEI_Disciplina
        description: "Disciplinas disponíveis para uso no Plano Educacional Individualizado, com suas configurações e modalidades."
    freshness:
      error_after: {count: 24, period: hour}
    loaded_at_field: _airbyte_extracted_at
