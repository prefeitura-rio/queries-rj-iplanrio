version: 2

models:
  - name: raw_plano_educacional_individualizado_grupamento_disciplina
    description: "Grupamentos da Disciplina"
    columns:
      - name: id_grupamento
        description: "Identificador do grupamento"
        data_type: int64
        data_tests:
          - not_null:
              name: raw_plano_educacional_individualizado_grupamento_disciplina__id_grupamento__not_null
              config:
                severity: error

      - name: id_disciplina
        description: "Identificador da disciplina"
        data_type: int64
        data_tests:
          - not_null:
              name: raw_plano_educacional_individualizado_grupamento_disciplina__id_disciplina__not_null
              config:
                severity: error

      - name: loaded_at
        description: "Timestamp de quando o dado foi extraído do banco de dados de origem."
        data_type: timestamp

      - name: transformed_at
        description: "Timestamp de quando o dado foi transformado no dbt."
        data_type: timestamp
