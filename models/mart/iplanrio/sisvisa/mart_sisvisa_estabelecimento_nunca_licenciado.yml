      - name: endereco_responsavel.bairro
        description: "Bairro do endereço do responsável."
        data_type: string
        quote: true
      - name: endereco_responsavel.cep
        description: "CEP do endereço do responsável."
        data_type: string
        quote: true
      - name: endereco_responsavel.municipio
