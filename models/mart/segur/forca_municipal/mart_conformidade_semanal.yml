version: 2

models:
  - name: mart_conformidade_semanal
    description: >
      Mart de conformidade operacional semanal para o comitê CompStat.
      Grain: uma linha por semana × área × missão (id_semana × id_missao).

      Responde: "na semana de X a Y, para essa área/rota, qual foi o índice de
      conforme / despacho / desvio?" — percentuais somam sempre 100% por linha.

      Fonte: mart_unidade_em_missao (GPS × missão × estado de conformidade).
      id_semana é sempre o domingo que inicia a semana (DATE_TRUNC WEEK(SUNDAY)).
    config:
      schema: forca_municipal

    columns:
      # ── identificação da semana ───────────────────────────────────────────
      - name: id_semana
        description: >
          Data do domingo que inicia a semana operacional.
          Sempre DATE_TRUNC(data_semana_referencia_inicio, WEEK(SUNDAY)).
          Use para filtrar ou agrupar por semana: WHERE id_semana = '2026-05-17'.
        tests:
          - not_null

      - name: data_semana_referencia_inicio
        description: Data de início da semana de referência conforme definida no qmd_plano.
        tests:
          - not_null

      - name: data_semana_referencia_fim
        description: Data de fim da semana de referência conforme definida no qmd_plano.
        tests:
          - not_null

      - name: numero_semana
        description: Número da semana de referência do plano.

      # ── área e missão ─────────────────────────────────────────────────────
      - name: area
        description: Base operacional (NORTE, OESTE, LITORANEA). NULL para planos unificados.
        tests:
          - not_null

      - name: id_qmd
        description: Identificador do Quadro de Missão Diária.
        tests:
          - not_null

      - name: nome_qmd
        description: Nome descritivo do QMD.

      - name: id_missao
        description: Identificador da missão dentro do QMD.
        tests:
          - not_null

      - name: tipo_missao
        description: Tipo da missão (PTR, PB, RF, SV, SP, DS).

      - name: roteiro
        description: Descrição textual do roteiro ou área da missão.

      # ── cobertura ─────────────────────────────────────────────────────────
      - name: total_unidades
        description: Número de unidades distintas com GPS nesta missão na semana.

      - name: total_pontos_gps
        description: Total de pontos GPS avaliados (denominador dos percentuais).

      # ── contagens absolutas ───────────────────────────────────────────────
      - name: total_conforme
        description: Pontos GPS classificados como CONFORME (unidade dentro da área/rota planejada).

      - name: total_despacho
        description: Pontos GPS classificados como DESPACHO (unidade fora da missão por atendimento a ocorrência).

      - name: total_desvio
        description: Pontos GPS classificados como DESVIO (unidade fora da área/rota sem justificativa).

      # ── percentuais (somam 100% por linha) ───────────────────────────────
      - name: pct_conforme
        description: "Percentual de pontos CONFORME em relação ao total. Ex.: 72.4."

      - name: pct_despacho
        description: "Percentual de pontos DESPACHO em relação ao total. Ex.: 3.1."

      - name: pct_desvio
        description: "Percentual de pontos DESVIO em relação ao total. Ex.: 24.5."

      # ── espacial ──────────────────────────────────────────────────────────
      - name: geometry_missao
        description: >
          Geometry autoritativa da missão para visualização (LINESTRING para PTR,
          POINT para PB, POLYGON para RF/SV/SP). NULL para missões DS.
