version: 2

models:
  - name: mart_unidade_em_missao
    description: >
      Mart de conformidade operacional P3 da Força Municipal.
      Grain: uma linha por ponto GPS (unit_positions) × missão ativa no mesmo
      instante (mart_qmd_missoes_completo).

      Para cada leitura GPS, classifica a unidade em um de três estados:
        CONFORME  — dentro da área planejada da missão
        DESPACHO  — fora da área, mas em atendimento de ocorrência (justificado)
        DESVIO    — fora da área sem despacho ativo (alerta P3)

      Missões DS (deslocamento) são excluídas por não terem geometry definida.

      Status de despacho derivado de unidades_historico, que contém o histórico
      completo desde o go-live em dump cumulativo — cobertura total para qualquer
      GPS histórico.
    config:
      schema: forca_municipal

    columns:
      # ── rastreabilidade ───────────────────────────────────────────────────
      - name: id_hash
        description: Hash do ponto GPS (id_hash de unit_positions). Não é único neste mart — um GPS pode aparecer em múltiplas missões.
        tests:
          - not_null

      - name: data_particao
        description: Data de partição (herdada de unit_positions).
        tests:
          - not_null

      - name: data_hora
        description: Timestamp da leitura GPS (America/Sao_Paulo).
        tests:
          - not_null

      - name: data_coleta
        description: Data em que o dado foi coletado pela pipeline.

      # ── identificadores ───────────────────────────────────────────────────
      - name: id_unidade
        description: Identificador da unidade operacional.
        tests:
          - not_null

      - name: id_qmd
        description: QMD ativo no momento da leitura GPS.
        tests:
          - not_null

      - name: id_plano
        description: Plano semanal ao qual o QMD pertence.

      - name: id_servico
        description: Alocação da unidade ao QMD dentro do plano.

      - name: id_missao
        description: Missão específica que a unidade deveria estar executando.
        tests:
          - not_null

      # ── contexto do plano / QMD ───────────────────────────────────────────
      - name: area
        description: Base operacional do plano (NORTE, OESTE, LITORANEA).

      - name: numero_semana
        description: Número da semana de referência do plano.

      - name: data_semana_referencia_inicio
        description: Início da semana de referência.

      - name: data_semana_referencia_fim
        description: Fim da semana de referência.

      - name: nome_qmd
        description: Nome do QMD ativo.

      - name: tipo_unidade
        description: Tipo da unidade (POG, VTR, MOT, etc.).

      - name: base_operacional
        description: Base operacional da unidade.

      - name: hora_inicio_qmd
        description: Horário de início do turno do QMD.

      - name: hora_fim_qmd
        description: Horário de fim do turno do QMD.

      - name: indicador_hora_cruza_meia_noite
        description: >
          TRUE quando o turno do QMD cruza 00:00. O filtro de hora foi
          aplicado com lógica condicional para esse caso durante o join.

      - name: duracao_minutos_qmd
        description: Duração total do turno do QMD em minutos.

      # ── contexto da missão ────────────────────────────────────────────────
      - name: tipo_missao
        description: Tipo da missão (PTR, PB, RF, SV, SP). DS excluído por não ter geometry.

      - name: roteiro
        description: Descrição textual do roteiro da missão.

      - name: hora_inicio_missao
        description: Horário de início planejado da missão.

      - name: hora_fim_missao
        description: Horário de fim planejado da missão.

      - name: dia_semana
        description: >
          Dia da semana da execução planejada (dom, seg, ter, qua, qui, sex, sab).
          Derivado de execucoes.week_day — vem diretamente da janela de execução
          que fez match com o GPS, sem derivação a partir do timestamp.

      - name: dia_semana_numero
        description: >
          Número ISO do dia da semana da execução (1=seg … 7=dom).
          Derivado de execucoes.week_day_number. Útil para ordenação e filtros numéricos.

      # ── conformidade ──────────────────────────────────────────────────────
      - name: indicador_dentro_area_missao
        description: >
          TRUE se a geometria GPS está dentro do polígono/linha/ponto da missão
          (ST_WITHIN). FALSE para unidades fora da área planejada.
        tests:
          - not_null

      - name: indicador_em_despacho
        description: >
          TRUE se a unidade estava com status DP ou QE no momento da leitura GPS,
          derivado de unidades_historico via intervalos de status (LEAD).
          Cobre todo o histórico desde o go-live.
          FALSE se sem registro de status ou sem despacho ativo no momento.
        tests:
          - not_null

      - name: estado_conformidade
        description: >
          Classificação P3 da leitura GPS:
            CONFORME — dentro da área planejada
            DESPACHO — fora da área com despacho ativo (justificado)
            DESVIO   — fora da área sem despacho (alerta P3)
        tests:
          - not_null
          - accepted_values:
              values: ['CONFORME', 'DESPACHO', 'DESVIO']

      # ── posição GPS ───────────────────────────────────────────────────────
      - name: latitude
        description: Latitude da leitura GPS.

      - name: longitude
        description: Longitude da leitura GPS.

      - name: geometry_gps
        description: Ponto geoespacial da leitura GPS.

      - name: geometry_missao
        description: Geometry da missão usada para o cálculo de ST_WITHIN.
