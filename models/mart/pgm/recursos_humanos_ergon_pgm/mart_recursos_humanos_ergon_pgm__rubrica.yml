version: 2

models:
  - name: raw_recursos_humanos_ergon_pgm__rubrica
    description: "**Descrição**: Tabela que armazena informações sobre rubricas de pagamento.\n**Frequência de atualização**: Diária\n**Cobertura temporal**: Data do menor registro\n**Órgão gestor dos dados**: PGM\n**Publicado por**: Luciano Muniz Francisco\n**Publicado por (email)**: luciano.muniz@prefeitura.rio\n"
    columns:
      - name: id_rubrica
        description: Identificador único da rubrica.
        data_type: integer
      - name: tipo_rubrica
        description: Tipo da rubrica.
        data_type: string
        quote: true
      - name: nome
        description: Nome da rubrica.
        data_type: string
        quote: true
      - name: nome_abreviado
        description: Nome abreviado da rubrica.
        data_type: string
        quote: true
      - name: fator
        description: Fator de multiplicação do valor a ser pago ao funcionário (1) ou descontado (-1) no lançamento da rubrica.
        data_type: integer
      - name: observacoes
        description: Observações sobre a rubrica.
        data_type: string
        quote: true

