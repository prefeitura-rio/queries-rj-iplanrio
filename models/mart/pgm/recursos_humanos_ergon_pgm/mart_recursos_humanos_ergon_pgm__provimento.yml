version: 2

models:
  - name: mart_recursos_humanos_ergon_pgm__provimento
    description: "**Descrição**: Eventos relacionados aos vínculos funcionais tanto com a administração direta como indireta da prefeitura do Rio de Janeiro. \r\nUm provimento pode ser uma progressão, mudança de lotação, mudança de vencimento (referência) etc. Um provimento é um evento na situação funcional do vínculo.\n**Frequência de atualização**: Diária\n**Cobertura temporal**: Data do menor registro\n**Órgão gestor dos dados**: PGM\n**Publicado por**: Luciano Muniz Francisco\n**Publicado por (email)**: luciano.muniz@prefeitura.rio\n"
    columns:
      - name: id_funcionario
        description: Identificador no banco de dados da pessoa cadastrada na tabela de funcionários.
        data_type: string
        data_tests:
          - not_null:
              name: mart_recursos_humanos_ergon_pgm__provimento__id_funcionario__not_null
              config:
                severity: error
      - name: id_vinculo
        description: Identificador no banco de dados do vínculo da pessoa.
        data_type: string
        data_tests:
          - not_null:
              name: mart_recursos_humanos_ergon_pgm__provimento__id_vinculo__not_null
              config:
                severity: error
      - name: data_inicio
        description: Data de inicio de um provimento.
        data_type: date
      - name: data_fim
        description: Data de fim do provimento
        data_type: date
      - name: id_setor
        description: Código dado pela prefeitura do Rio de Janeiro para o setor de lotação do servidor após o provimento. Código da estrutura organizacional atribuidos pela GI/CGGI/CSIC.
        data_type: string
      - name: id_cargo
        description: Código dado pela prefeitura do Rio de Janeiro para o cargo/emprego relacionado ao vínculo do servidor. Regime juridicos A DISPOSICAO, APOS. SERV. PUBLICO, CONT. SAL. FAMILIA e EST. AOS QUADROS o cargo é 999990 - ESPECIAL
        data_type: string
      - name: id_referencia
        description: Código do nível/posicionamento após o provimento. Ex PROFESSOR II, MM1, MM2, MM3, MM4, MM5, MM6, MM7, 999990 - ESPECIAL o valor do vencimento é zero.
        data_type: string
        quote: true
      - name: id_jornada
        description: Código dado pela prefeitura do Rio de Janeiro para a jornada semanal do cargo/emprego associado ao vínculo. Não é modificada pelos provimentos.
        data_type: string
        quote: true
      - name: id_forma_provimento
        description: Código numérico definido pelo gestor do Sistema que identifica a forma de provimento. Ex. 10 (EM EXERCÍCIO - CC/FG, ocorre quando a pessoa entra exercício em cargo em comissão).
        data_type: int64
      - name: regime_horas
        description: Regime de horas do cargo/emprego associado ao vínculo. Ex. 20H, 40H, 24H, 12H, 30H, 36H, 60H, 10H, 16H, 18H, 14H, 8H etc. O regime de horas é modificado pelos provimentos quando há mudança de cargo/emprego.
        data_type: string
        quote: true
      - name: observacoes
        description: Observação - texto livre. Ex. NOMEADA C/ VAL. 30/03/20 P/ C.C COORDENADOR TECNICO, 074842 CVL/SUBSC/CGRH/CTNRH, PCCS - LEI 6.739/2020 etc
        data_type: string
        quote: true
      - name: id_empresa
        description: Empresa do servidor após o provimento. Sempre é a mesma empresa do vínculo.
        data_type: string
        quote: true
      - name: data_atualizacao
        description: Data da última atualização do registro.
        data_type: timestamp




