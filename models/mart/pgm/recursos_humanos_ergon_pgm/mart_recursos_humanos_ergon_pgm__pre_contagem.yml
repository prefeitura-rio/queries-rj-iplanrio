version: 2

models:
  - name: mart_recursos_humanos_ergon_pgm__pre_contagem
    description: "**Descrição**: A tabela armazena informações de contagens anteriores ao início do sistema recursos humanos ou da entrada do servidor no sistema, se por algum motivo não possuía informações anteriormente.\n**Frequência de atualização**: Diária\n**Cobertura temporal**: Data do menor registro\n**Órgão gestor dos dados**: PGM\n**Publicado por**: Luciano Muniz Francisco\n**Publicado por (email)**: luciano.muniz@prefeitura.rio\n"
    columns:
      - name: finalidade
        description: "Tipo da finalidade que motivou o cadastro da pré-contagem. \r\nExemplo  \"Aposentadoria\", \"Progressão\"."
        data_type: string
        quote: true
      - name: id_funcionario
        description: Número do funcionário gerado pelo ERGON.
        data_type: string
        quote: true
        data_tests:
          - not_null:
              name: mart_recursos_humanos_ergon_pgm__pre_contagem__id_funcionario__not_null
              config:
                severity: error
      - name: id_vinculo
        description: Número do vínculo relativo ao pagamento.
        data_type: string
        quote: true
        data_tests:
          - not_null:
              name: mart_recursos_humanos_ergon_pgm__pre_contagem__id_vinculo__not_null
              config:
                severity: error
      - name: periodos
        description: Quantidade de períodos de contagem para determinada finalidade.
        data_type: integer
      - name: dias
        description: Total de dias da pré-contagem.
        data_type: integer
      - name: data_validade
        description: Data de validade da pré-contagem.
        data_type: date
      - name: id_empresa
        description: Código da empresa.
        data_type: string
      - name: observacoes
        description: Campo de observações sobre a pré-contagem.
        data_type: string
        quote: true




